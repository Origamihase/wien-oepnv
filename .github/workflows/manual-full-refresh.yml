name: Manual full refresh

# Manueller Sammel-Workflow: aktualisiert in einem Lauf saemtliche Caches,
# anschliessend das Stationsverzeichnis und zuletzt den Feed. Gedacht als
# einfacher "alles neu"-Trigger – die regulaer geplanten Einzel-Workflows
# bleiben unveraendert bestehen.
#
# 2026-05-11: VOR ist projektweit auf den Stammstrecken-Verspätungs-
# Monitor beschränkt (Operator-Policy "VOR nur noch für die
# Verspätungen der Stammstrecke"). Der Monitor läuft als Schritt
# unten in diesem Workflow und in ``update-cycle.yml`` (~30 Min).
# Die früheren VOR-Helper-Scripts (``update_vor_cache.py``,
# ``update_vor_stations.py``, ``fetch_vor_haltestellen.py``) wurden
# 2026-05-11 aus ``scripts/`` entfernt; das Stationsverzeichnis nutzt
# die gepinnte ``data/vor-haltestellen.csv``.

on:
  workflow_dispatch:

permissions:
  contents: read

# Teilt sich die Sperre mit den einzelnen Cache-Workflows, damit nicht
# parallel auf die gleichen externen APIs zugegriffen wird.
concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      PIP_CACHE_DIR: /tmp/pip-cache
      VOR_ACCESS_ID: ${{ secrets.VOR_ACCESS_ID }}
      VOR_BASE_URL: ${{ secrets.VOR_BASE_URL }}
      VOR_BASE: ${{ secrets.VOR_BASE }}
      VOR_VERSION: ${{ secrets.VOR_VERSION }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Ensure pip cache directory exists
        run: mkdir -p "$PIP_CACHE_DIR"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # ----- 1) Caches der Quellsysteme aktualisieren -----
      - name: Refresh Baustellen cache
        run: python scripts/update_baustellen_cache.py

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Refresh ÖBB cache
        run: python scripts/update_oebb_cache.py

      # VOR-Cache-Refresh entfällt seit 2026-05-11 vollständig
      # (Operator-Policy "VOR nur noch für die Stammstrecke"). Der
      # Stammstrecke-Step (unten) ist damit der einzige VOR-API-
      # Konsument in diesem Workflow.

      - name: Validate VOR secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VOR_ACCESS_ID:-}" || -z "${VOR_BASE_URL:-}" ]]; then
            echo "Secrets fehlen (VOR_ACCESS_ID/VOR_BASE_URL)." >&2
            exit 1
          fi

      # Stammstrecke delay monitor. Since 2026-05-15 this is the
      # ``/departureBoard``-based ``update_stammstrecke_hbf.py`` which
      # queries Wien Hauptbahnhof once per run and classifies each
      # departure into the ``Meidling`` / ``Floridsdorf`` directions via
      # terminus whitelists. Writes one CSV row per direction to
      # ``data/stats/stammstrecke_<YYYY>.csv``; the feed builder reads
      # the CSV directly (see ``src/feed/stammstrecke.py``) so this step
      # has no separate cache-file dependency.
      #
      # MUST NOT be swapped back to ``update_stammstrecke_status.py``
      # without first purging ``cache/stammstrecke/pending_trips.json``
      # — the two scripts use different ``scheduled`` semantics in the
      # identity key (Hbf departure time vs train origin departure time)
      # and concurrent persistence would book the same physical train
      # under two different ledger keys, producing duplicate CSV rows
      # at finalisation.
      - name: Refresh Stammstrecke status
        run: python scripts/update_stammstrecke_hbf.py

      # ----- 2) Stationsverzeichnis aktualisieren -----
      # Die VOR-Stop-Liste wurde 2026-05-11 vollständig auf die
      # gepinnte ``data/vor-haltestellen.csv``-Snapshot umgestellt;
      # ein Live-Refresh-Skript existiert nicht mehr. VOR-Stop-IDs
      # ändern sich nur selten — bei Bedarf wird die CSV redaktionell
      # neu eingespielt.

      - name: Refresh station directory
        run: python scripts/update_all_stations.py --verbose

      - name: Regenerate validation report
        run: python -m src.cli stations validate --output docs/stations_validation_report.md

      # ----- 3) Feed bauen -----
      - name: Build feed
        run: python -m src.cli feed build
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder geschrieben.
          # Aus dem aktuellen Repo abgeleitet, damit Forks korrekte atom:link-URLs
          # schreiben statt auf das Original-Repo zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      # ----- 4) Statistik-Dashboard und README-Snapshot -----
      # Regeneriert docs/statistik.md (Dashboard) und patcht zugleich die
      # <!-- STATS:* --> Marker im README mit dem 30-Tage-Schnappschuss.
      # Liest ausschliesslich aus data/stats/*.csv (read-only) und schreibt
      # via atomic_write — ein Lauf ohne neue Daten patcht das README nur,
      # wenn sich die "Letzte Aktualisierung"-Zelle aendert. Muss nach dem
      # Stammstrecke-Schritt laufen, damit die Auswertung den frischen
      # CSV-Eintrag enthaelt.
      #
      # Kein ``--skip-dashboard`` hier (anders als ``build-feed.yml``):
      # Dieser Workflow wird ausschliesslich per ``workflow_dispatch``
      # vom Operator gestartet — das ist eine bewusste Override-Aktion,
      # die das gesamte Projekt frisch ziehen soll. Die einmal-pro-Tag-
      # Vereinbarung fuer ``docs/statistik.md`` ist ein Schutz vor der
      # *automatischen* 30-min-Churn (IFTTT-getriggertes
      # ``update-cycle.yml`` und push-getriggertes ``build-feed.yml``);
      # ein expliziter Operator-
      # Trigger soll daran nicht scheitern.
      - name: Refresh statistics dashboard and README snapshot
        run: python scripts/generate_markdown_stats.py

      # ----- 5) Aenderungen committen und pushen -----
      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: full project refresh (manual trigger) [skip ci]'
          add_options: '-A'
          push_options: '--force-with-lease'
