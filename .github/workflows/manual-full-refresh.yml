name: Manual full refresh

# Manueller Sammel-Workflow: aktualisiert in einem Lauf saemtliche Caches,
# anschliessend das Stationsverzeichnis und zuletzt den Feed. Gedacht als
# einfacher "alles neu"-Trigger – die regulaer geplanten Einzel-Workflows
# bleiben unveraendert bestehen.
#
# 2026-05-11: VOR ist projektweit auf den Stammstrecken-Verspätungs-
# Monitor beschränkt (Operator-Policy "VOR nur noch für die
# Verspätungen der Stammstrecke"). Der Monitor läuft als Schritt
# unten in diesem Workflow und in ``update-cycle.yml`` (~30 Min).
# Die früheren VOR-Helper-Scripts (``update_vor_cache.py``,
# ``update_vor_stations.py``, ``fetch_vor_haltestellen.py``) wurden
# 2026-05-11 aus ``scripts/`` entfernt; das Stationsverzeichnis nutzt
# die gepinnte ``data/vor-haltestellen.csv``.

on:
  workflow_dispatch:

permissions:
  contents: read

# Teilt sich die Sperre mit den einzelnen Cache-Workflows, damit nicht
# parallel auf die gleichen externen APIs zugegriffen wird.
concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Defense-in-depth ceiling: the manual full-refresh is the heaviest
    # workflow in the project — it does WL + ÖBB + Baustellen + VOR cache
    # refreshes + station directory rebuild + feed compose + stats render
    # + sitemap. Healthy runs take 20-40 min depending on whether the
    # HF/pip cache is warm. 60 min gives ~1.5x headroom over the worst
    # legitimate cold-cache run while catching genuine hangs (stuck
    # upstream API, runaway OSM Overpass round-trip) quickly. Without
    # the cap the workflow inherits GitHub's 360-min default. Mirrors
    # the canonical defence shape established in update-cycle.yml.
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      PIP_CACHE_DIR: /tmp/pip-cache
      VOR_ACCESS_ID: ${{ secrets.VOR_ACCESS_ID }}
      VOR_BASE_URL: ${{ secrets.VOR_BASE_URL }}
      VOR_BASE: ${{ secrets.VOR_BASE }}
      VOR_VERSION: ${{ secrets.VOR_VERSION }}

    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Ensure pip cache directory exists
        run: mkdir -p "$PIP_CACHE_DIR"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # Hugging Face Hub cache for the EN translation model
      # (Helsinki-NLP/opus-mt-de-en, ~300 MB). Without this, every
      # manual refresh would have to re-download the model and the EN
      # feed items would flag as ``[Partially translated]`` while the
      # pipeline initialised. Monthly-rotating cache key with
      # previous-month restore-key keeps the cache warm without
      # blocking model autoupdates beyond ~30 days.
      - name: Resolve Hugging Face cache key
        id: hf-cache-key
        shell: bash
        run: |
          echo "month=$(date -u +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Hugging Face hub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ steps.hf-cache-key.outputs.month }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      # PyTorch (CPU-only wheel) — installed BEFORE the project
      # requirements so the transformers pipeline shipped in
      # ``requirements.txt`` finds a working torch backend. Without
      # this step ``pipeline("translation_de_to_en", …)`` raises a
      # ``RuntimeError`` and every EN-feed item degrades to the
      # ``[Partially translated]`` marker.
      - name: Install PyTorch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # ----- 1) Caches der Quellsysteme aktualisieren -----
      # ``continue-on-error``: der Baustellen-Updater gibt Exit 2 zurück,
      # wenn der Live-WFS-Abruf scheitert und das Fallback-Sample
      # geschrieben wird (siehe ``update_baustellen_cache.main``). Eine
      # einzelne degradierte Quelle darf den manuellen Full-Refresh NICHT
      # abbrechen (sonst kein Feed-Rebuild) — die Warnung bleibt im Log
      # sichtbar, der Step wird als "tolerierter Fehler" markiert.
      - name: Refresh Baustellen cache
        continue-on-error: true
        run: python scripts/update_baustellen_cache.py

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Refresh ÖBB cache
        run: python scripts/update_oebb_cache.py

      # VOR-Cache-Refresh entfällt seit 2026-05-11 vollständig
      # (Operator-Policy "VOR nur noch für die Stammstrecke"). Der
      # Stammstrecke-Step (unten) ist damit der einzige VOR-API-
      # Konsument in diesem Workflow.

      - name: Validate VOR secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VOR_ACCESS_ID:-}" || -z "${VOR_BASE_URL:-}" ]]; then
            echo "Secrets fehlen (VOR_ACCESS_ID/VOR_BASE_URL)." >&2
            exit 1
          fi

      # Stammstrecke delay monitor. Since 2026-05-15 this is the
      # ``/departureBoard``-based ``update_stammstrecke_hbf.py`` which
      # queries Wien Hauptbahnhof once per run and classifies each
      # departure into the ``Meidling`` / ``Floridsdorf`` directions via
      # terminus whitelists. Writes one CSV row per direction to
      # ``data/stats/stammstrecke_<YYYY>.csv``; the feed builder reads
      # the CSV directly (see ``src/feed/stammstrecke.py``) so this step
      # has no separate cache-file dependency.
      #
      # MUST NOT be swapped back to ``update_stammstrecke_status.py``
      # without first purging ``cache/stammstrecke/pending_trips.json``
      # — the two scripts use different ``scheduled`` semantics in the
      # identity key (Hbf departure time vs train origin departure time)
      # and concurrent persistence would book the same physical train
      # under two different ledger keys, producing duplicate CSV rows
      # at finalisation.
      - name: Refresh Stammstrecke status
        run: python scripts/update_stammstrecke_hbf.py

      # ----- 2) Stationsverzeichnis aktualisieren -----
      # Die VOR-Stop-Liste wurde 2026-05-11 vollständig auf die
      # gepinnte ``data/vor-haltestellen.csv``-Snapshot umgestellt;
      # ein Live-Refresh-Skript existiert nicht mehr. VOR-Stop-IDs
      # ändern sich nur selten — bei Bedarf wird die CSV redaktionell
      # neu eingespielt.

      - name: Refresh station directory
        run: python scripts/update_all_stations.py --verbose

      - name: Regenerate validation report
        run: python -m src.cli stations validate --output docs/stations_validation_report.md

      # ----- 3) Feed bauen -----
      - name: Build feed
        run: python -m src.cli feed build
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder geschrieben.
          # Aus dem aktuellen Repo abgeleitet, damit Forks korrekte atom:link-URLs
          # schreiben statt auf das Original-Repo zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      # ----- 4) Statistik-Dashboard und README-Snapshot -----
      # Regeneriert docs/statistik.md (Dashboard) und patcht zugleich die
      # <!-- STATS:* --> Marker im README mit dem 30-Tage-Schnappschuss.
      # Liest ausschliesslich aus data/stats/*.csv (read-only) und schreibt
      # via atomic_write — ein Lauf ohne neue Daten patcht das README nur,
      # wenn sich die "Letzte Aktualisierung"-Zelle aendert. Muss nach dem
      # Stammstrecke-Schritt laufen, damit die Auswertung den frischen
      # CSV-Eintrag enthaelt.
      #
      # Kein ``--skip-dashboard`` hier (anders als ``build-feed.yml``):
      # Dieser Workflow wird ausschliesslich per ``workflow_dispatch``
      # vom Operator gestartet — das ist eine bewusste Override-Aktion,
      # die das gesamte Projekt frisch ziehen soll. Die einmal-pro-Tag-
      # Vereinbarung fuer ``docs/statistik.md`` ist ein Schutz vor der
      # *automatischen* 30-min-Churn (IFTTT-getriggertes
      # ``update-cycle.yml`` und push-getriggertes ``build-feed.yml``);
      # ein expliziter Operator-
      # Trigger soll daran nicht scheitern.
      - name: Refresh statistics dashboard and README snapshot
        run: python scripts/generate_markdown_stats.py

      # ----- 5) Aenderungen committen und pushen -----
      - name: Pull concurrent remote changes
        shell: bash
        run: |
          set -euo pipefail

          # ``git pull --rebase --autostash`` does NOT fail when the
          # autostash RE-APPLY conflicts: the rebase (fast-forward onto a
          # concurrent push) succeeds, the failed ``git stash apply`` is
          # only a warning, and the step still exits 0 — leaving an UNMERGED
          # index. The next step (git-auto-commit-action) then dies with the
          # opaque "error: you need to resolve your current index first"
          # (observed 2026-05-25 on update-cycle.yml, the mirror of this
          # commit pattern). The shared ``external-api-fetch`` concurrency
          # lane now serialises the feed-writing workflows so this collision
          # should not recur; the block below is the defense-in-depth
          # backstop that keeps ANY residual concurrent push (a manual push,
          # a future workflow) from re-introducing the silent-unmerged-index
          # failure.
          git pull --rebase --autostash

          # Append-only ledgers (``data/stats/*.csv``) auto-resolve via the
          # ``merge=union`` driver in ``.gitattributes`` — both sides' rows
          # are kept, so they never surface as unmerged here. Everything
          # else this refresh writes (feed XMLs, README, statistik.md, the
          # station directory, the ``first_seen`` state) is a full
          # regeneration, so on the rare residual conflict the locally built
          # copy is authoritative.
          mapfile -t -d '' conflicts < <(git diff --name-only --diff-filter=U -z)
          if [ "${#conflicts[@]}" -gt 0 ]; then
            echo "::warning title=reconcile::autostash re-apply conflicted on a concurrent push; keeping locally-built copies for: ${conflicts[*]}"
            # In a stash-apply conflict, stage 3 ("--theirs") is the stashed
            # locally-built version; stage 2 is the just-pulled upstream.
            git checkout --theirs -- "${conflicts[@]}"
            git add -- "${conflicts[@]}"
            # A conflicted ``git stash apply`` leaves the autostash entry on
            # the stash stack; drop it so it cannot leak into a later run.
            git stash drop || true
          fi

          # Never hand an unmerged index to the auto-commit step.
          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "::error title=reconcile::unresolved merge conflicts remain after reconcile" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: 'chore: full project refresh (manual trigger) [skip ci]'
          add_options: '-A'
          push_options: '--force-with-lease'
