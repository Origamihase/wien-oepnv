name: Complexity gate (C901 allowlist)

# Mirrors the structure of mypy-strict.yml: an allowlist baseline
# (.c901-baseline.txt) records every function currently above the
# C901 threshold (15). The gate fails only if a PR introduces a NEW
# violation, OR if a baselined function has gotten more complex.
# Reducing complexity below threshold is always allowed; it just
# triggers a `::notice::` asking the contributor to regenerate the
# baseline to lock in the improvement.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: complexity-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  c901-gate:
    name: C901 complexity gate (max 15 for new code)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps
        with:
          requirements: requirements-dev.txt

      - name: Run C901 gate
        run: python scripts/check_complexity.py
