name: Update Baustellen cache

# DISABLED CRON (2026-05-09): the regular hourly schedule was
# replaced by ``update-cycle.yml``, a single-job sequential pipeline
# that runs the Baustellen refresh alongside WL/ÖBB/Stammstrecke in
# one runner. Driven by the IFTTT ``ifttt_feed_trigger``
# repository_dispatch event (~30-min cadence; see header of
# update-cycle.yml). This workflow remains as a ``workflow_dispatch``-
# only escape hatch for manually re-fetching the Baustellen cache
# between regular cycle runs.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      PIP_CACHE_DIR: /tmp/pip-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure pip cache directory exists
        run: mkdir -p "$PIP_CACHE_DIR"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Refresh Baustellen cache
        run: python scripts/update_baustellen_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: update Baustellen cache'
          file_pattern: 'cache/baustellen*/events.json'
