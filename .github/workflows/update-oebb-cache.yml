name: Update ÖBB cache

on:
  schedule:
    - cron: '20,50 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      PIP_CACHE_DIR: /tmp/pip-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure pip cache directory exists
        run: mkdir -p "$PIP_CACHE_DIR"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Pin pip<26 vorsorglich gegen unerwartete Breaking Changes in pip 26.x.
          # pip 26.0 ist seit 2026-01 released, 26.1 seit 2026-04 — Kompatibilität
          # mit unseren Deps (defusedxml, openpyxl, dnspython) noch nicht durchgetestet.
          # Re-evaluate als eigener Followup-PR. Letzte Prüfung: 2026-05-01.
          python -m pip install "pip<26"
          pip install -r requirements.txt

      - name: Refresh ÖBB cache
        run: python scripts/update_oebb_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: update ÖBB cache'
          file_pattern: 'cache/oebb*/events.json'
