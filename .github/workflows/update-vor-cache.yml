name: Update VOR cache

on:
  schedule:
    - cron: '15 * * * *'
    # SAFETY: Max 24 runs/day * 2 stations = 48 reqs (Limit: 100)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      VOR_ACCESS_ID: ${{ secrets.VOR_ACCESS_ID }}
      VOR_BASE_URL: ${{ secrets.VOR_BASE_URL }}
      VOR_BASE: ${{ secrets.VOR_BASE }}
      VOR_VERSION: ${{ secrets.VOR_VERSION }}
      PIP_CACHE_DIR: /tmp/pip-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure pip cache directory exists
        run: mkdir -p "$PIP_CACHE_DIR"

      - name: Validate VOR secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VOR_ACCESS_ID:-}" || -z "${VOR_BASE_URL:-}" ]]; then
            echo "Secrets fehlen (VOR_ACCESS_ID/VOR_BASE_URL)." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install "pip<26"
          pip install -r requirements.txt

      - name: Smoke test VOR
        shell: bash
        run: |
          set -euo pipefail
          base="${VOR_BASE_URL:-${VOR_BASE}/${VOR_VERSION}/}"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -G \
            --max-time 15 \
            "${base}location.name" \
            --data-urlencode "input=Wien Hauptbahnhof" \
            --data-urlencode "format=json" \
            --data-urlencode "accessId=${VOR_ACCESS_ID}")
          echo "location.name -> HTTP ${code}"
          test "$code" = "200"

      - name: Get Date
        id: date
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "date<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Refresh VOR cache
        run: python scripts/update_vor_cache.py

      - name: Pull concurrent remote changes
        if: ${{ github.ref_type == 'branch' }}
        run: git pull --rebase --autostash

      - name: Commit and push changes
        if: ${{ github.ref_type == 'branch' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: update VOR cache [skip ci]'
          file_pattern: 'cache/vor*/events.json data/vor_request_count.json'
