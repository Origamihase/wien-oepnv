# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Bandit is a security linter designed to find common security issues in Python code.
# This action will run Bandit on your codebase.
# The results of the scan will be found under the Security tab of your repository.

# https://github.com/marketplace/actions/bandit-scan is ISC licensed, by abirismyname
# https://pypi.org/project/bandit/ is Apache v2.0 licensed, by PyCQA

name: Bandit
on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '29 19 * * 3'

permissions:
  contents: read

jobs:
  bandit:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    runs-on: ubuntu-latest
    # Defense-in-depth ceiling: bandit scans ~17 kLOC in under two minutes
    # on a stock GH runner. Without the cap a hung subprocess in any step
    # would inherit GitHub's 360-min default and burn 6h of billable
    # minutes per stuck run. 10 min gives ~5x headroom over the worst
    # observed legitimate runtime while catching hangs quickly. Mirrors
    # the canonical defence shape established in update-cycle.yml.
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]>=1.9.4,<2.0"

      - name: Run Bandit Security Scan
        run: bandit -r src/ -f sarif -o bandit-results.sarif
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: bandit-results.sarif
