name: Update cycle

# Single-job sequential pipeline. One cycle tick runs every fetcher
# + the feed composer + the README/stats render in a single runner
# with shared workspace, then emits ONE commit covering every
# output.
#
# Trigger model (since 2026-05-10, commit 55ca72f): IFTTT drives the
# precise cadence; a sparse GitHub-native cron is a safety net only.
#   * IFTTT fires ``repository_dispatch: ifttt_feed_trigger`` on the
#     normal ~30-min cadence (lands close to :00/:30 with less drift
#     than the GH Actions cron tick the project used previously). This
#     is the PRIMARY driver of the 30-min "data + feed" cadence.
#   * Operators press ``Run workflow`` (``workflow_dispatch``) for
#     out-of-band runs.
#   * ``schedule: cron '17 * * * *'`` (hourly, off-cadence minute) is a
#     BACKUP only — it catches a tick that IFTTT missed entirely or a
#     tick that died in the runner setup phase (a first-party action
#     download that cannot be retried from inside the job). It does NOT
#     drive the primary cadence (IFTTT still owns :00/:30) and cannot
#     breach the VAO 100/day budget: the ``preflight_quota_check`` gate
#     skips the quota-bound poll once the daily counter is near the cap.
#     A second guard — the ``Backup-cron freshness gate`` step — makes a
#     backup tick SKIP all fetch/build/publish work when a cycle tick
#     already committed within ~35 min, so on healthy days the backup
#     costs ~zero API calls and only does real work during a genuine
#     outage. Without this net, an IFTTT outage would silently freeze
#     the live feed.
# The weekly station-directory refresh is a separate GitHub-native cron
# in ``update-stations.yml`` (Sundays 01:00 UTC).
#
# Why single-job (replaces the DAG-with-artifacts architecture from
# 2026-05-09 which broke the README cadence): the artifact-based
# approach added two failure modes — invalid action SHAs and the
# ``actions/download-artifact`` glob/pattern semantics — that
# silently kept ``build_feed`` from ever committing. The single-job
# rewrite has zero artifact plumbing, no inter-job push race, and a
# single inline commit + resilient push at the end (see the "Validate
# and publish cycle outputs" step) so the operator-visible state moves
# atomically (or not at all). The trade-off is sequential runtime
# (~3-5 min vs the DAG's ~2-3 min) and slightly less granular UI
# observability — both acceptable for the 30-min cadence.
#
# Step order:
#   1. ``actions/checkout`` (full history for clean rebase later) +
#      configure the bot git identity once for the whole job
#   2. backup-cron freshness gate — on a ``schedule`` run decide whether a
#      recent tick already covered this window; steps 4-7 gate on its
#      ``should_run`` output (dispatch / manual runs always run)
#   3. ``actions/setup-python`` + venv-cache restore + conditional
#      ``pip install`` on cache miss + prepend ``.venv/bin`` to PATH
#   4. WL / ÖBB / Baustellen cache fetchers (parallel via bash; free APIs)
#   5. VAO quota pre-flight + Stammstrecke poll (gated on counter)
#   6. ``feed build`` reads all caches + the freshly-appended CSV
#      ledger and writes ``docs/feed.xml`` + ``data/first_seen.json``
#      + appends to ``data/stats/stoerungen_<YYYY>.csv`` (step-capped)
#   7. ``generate_markdown_stats.py`` patches the README markers and
#      regenerates ``docs/statistik.md`` (best-effort, continue-on-error:
#      a cosmetic stats failure must NEVER block the feed publish)
#   8. validate the built feed XML, then a single inline ``git commit``
#      + retrying, never-fail ``git push`` (reconcile onto concurrent
#      pushes is folded into the push loop; no external commit action —
#      see that step's header for the full resilience rationale)
#
# Concurrency: the workflow holds the ``external-api-fetch`` lock
# (shared with ``manual-full-refresh.yml`` and the dispatch-only
# escape-hatch workflows) so the project never has two parallel
# API-fetching cycles in flight.

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ifttt_feed_trigger]
  schedule:
    # Backup safety net only (see "Trigger model" above). Off-cadence
    # minute :17 so it never collides with IFTTT's :00/:30 ticks, and the
    # "Backup-cron freshness gate" step self-skips when a recent tick
    # already ran, so this costs ~zero API calls on healthy days.
    - cron: '17 * * * *'

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    # Defense-in-depth ceiling for the whole job. A healthy tick runs
    # in 3-5 min (see step-order comment above); without this cap the
    # workflow inherits GitHub's 360-min default, so a hung subprocess
    # in any step burns 6h of billable minutes and — combined with
    # ``concurrency: cancel-in-progress: false`` above — backs up the
    # next ~12 IFTTT triggers behind it. 10 min gives ~2x headroom over
    # the worst legitimate run while still catching hangs quickly.
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      # VOR/VAO API credentials — required by ``scripts/update_stammstrecke_hbf.py``
      # (the active producer; the legacy ``update_stammstrecke_status.py`` remains
      # only the documented rollback target). Without these env vars VAO rejects
      # every request with HTTP 400 (errorText="Missing value for required param accessId").
      VOR_ACCESS_ID: ${{ secrets.VOR_ACCESS_ID }}
      VOR_BASE_URL: ${{ secrets.VOR_BASE_URL }}
      VOR_BASE: ${{ secrets.VOR_BASE }}
      VOR_VERSION: ${{ secrets.VOR_VERSION }}

    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need full history so ``git pull --rebase --autostash`` can
          # cleanly stitch our commit onto whatever the parallel
          # ``update-stations.yml`` (Sundays) pushed during this run.
          fetch-depth: 0
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Configure the bot git identity once, up front, so every later
      # git-writing step shares it (today: the commit/push at the end).
      # Set on the local repo (not --global); it persists in .git/config
      # across steps in the shared workspace. actions/checkout does not
      # set a committer identity, so without this ``git commit`` would
      # fail with "Please tell me who you are".
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Backup-cron freshness gate. The hourly ``schedule`` tick is a
      # safety net (see "Trigger model" above), NOT a second cadence: when
      # IFTTT is healthy a cycle tick has already run within the last
      # ~30 min, so a backup tick would only burn a redundant VAO request
      # (the daily budget is metered) plus free-API fetches. This gate
      # makes a ``schedule`` run SKIP the fetch/build/publish work when a
      # cycle tick committed inside the freshness window, so the backup
      # cron costs ~zero API calls on healthy days and does real work only
      # when IFTTT has genuinely gone silent. IFTTT (``repository_dispatch``)
      # and operator (``workflow_dispatch``) runs are NEVER gated.
      #
      # Signal: the commit time of ``data/vor_request_count.json`` /
      # ``docs/feed.xml`` — the counter is rewritten on every VAO poll and
      # the feed on every content change, so "most recent commit touching
      # either" tracks the last real tick (full history is present via the
      # ``fetch-depth: 0`` checkout). The 35-min window sits just above
      # IFTTT's ~30-min cadence (drift headroom) so a slightly-late IFTTT
      # tick is not misread as an outage; a true outage is caught by the
      # next hourly tick. Unknown / parse-fail defaults to "run" (fail safe).
      - name: Backup-cron freshness gate
        id: freshness
        shell: bash
        run: |
          set -uo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "Trigger '${GITHUB_EVENT_NAME}' is not the backup cron — running the full cycle."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last=$(git log -1 --format=%ct -- data/vor_request_count.json docs/feed.xml 2>/dev/null || echo 0)
          last=${last:-0}
          now=$(date +%s)
          age=$(( now - last ))
          window=2100  # 35 min, just above IFTTT's ~30-min cadence
          if [ "${last}" -gt 0 ] && [ "${age}" -lt "${window}" ]; then
            echo "Backup cron: last cycle tick was ${age}s ago (< ${window}s) — IFTTT looks healthy; skipping this redundant tick (no API calls)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Backup cron: last cycle tick was ${age}s ago (>= ${window}s or unknown) — IFTTT may be down; running the full cycle as a safety net."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      # Hugging Face Hub cache for the EN translation model
      # (Helsinki-NLP/opus-mt-de-en, ~300 MB). Without this, every
      # ~30-min cycle tick would have to re-download the model — and
      # the first-time download is what previously caused the EN feed
      # to flag every item as ``[Partially translated]``: the pipeline
      # could not initialise inside the workflow, so ``_translate_text``
      # fell back to the German source for every disruption. The cache
      # key rotates monthly (``YYYY-MM``) so the upstream model can
      # autoupdate within ~30 days; ``restore-keys`` falls back to the
      # previous month to keep the warm cache.
      - name: Resolve Hugging Face cache key
        id: hf-cache-key
        shell: bash
        run: |
          echo "month=$(date -u +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Hugging Face hub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ steps.hf-cache-key.outputs.month }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      # Cache the entire installed virtual environment instead of the
      # pip download cache. ``setup-python``'s ``cache: 'pip'`` only
      # speeds up wheel resolution; pip still spends ~30 s rebuilding
      # the site-packages on every cycle tick. A venv cache lets us
      # skip the install step entirely on the common path (deps
      # unchanged), shaving ~20 s off each of the 48 daily runs.
      #
      # Cache key includes the resolved Python version (so a runner-
      # image bump from 3.11.10 → 3.11.11 invalidates correctly), a
      # content hash of ``requirements.txt`` AND of
      # ``install-deps/action.yml``. Any of these changing — adding
      # a dep, bumping a pinned version, modifying the install
      # procedure, the runner upgrading the base interpreter —
      # invalidates the cache so we never run with a venv that does
      # not match the current contract. NO ``restore-keys`` fallback:
      # a partial-match restore would land us on a stale venv that
      # could shadow a pinned upgrade silently.
      #
      # Security: actions/cache scopes caches per branch; a cache
      # written by a PR run cannot poison the ``main`` cache scope
      # (the cache-poisoning class described in
      # https://adnanthekhan.com/2024/05/06/the-monsters-in-your-build-cache-github-actions-cache-poisoning/
      # is mitigated by GitHub's branch isolation — caches created
      # on PR refs cannot be read from base-branch runs).
      - name: Restore Python virtual environment
        id: venv_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          # ``update-cycle.yml`` itself is hashed in so any inline
          # change to the install procedure (PR #1600 added the
          # ``pip install torch …`` line in the cache-miss branch
          # below; the cache key did NOT change because neither
          # ``requirements.txt`` nor ``install-deps/action.yml``
          # was touched, so existing cached venvs from before the
          # fix kept being restored — the install step was gated
          # off and ``torch`` stayed missing, leaving the EN feed
          # stuck on the ``[Partially translated]`` marker for
          # ~10 items/tick). Hashing the workflow file closes
          # that class of drift at the cache-key boundary.
          key: venv-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('requirements.txt', '.github/actions/install-deps/action.yml', '.github/workflows/update-cycle.yml') }}

      - name: Install dependencies (cache miss)
        if: steps.venv_cache.outputs.cache-hit != 'true'
        # Mirrors the ``install-deps`` composite action's pip cap
        # (<27, see ``.github/actions/install-deps/action.yml``); we
        # inline it here so the cached path produces a venv whose
        # interpreter + pip version match what the composite would
        # have built. Other workflows continue to use the composite.
        #
        # PyTorch (CPU-only wheel) is installed BEFORE the project
        # requirements file so the transformers pipeline shipped in
        # ``requirements.txt`` finds a working torch backend at runtime.
        # Without this step ``pipeline("translation_de_to_en", …)``
        # raises ``RuntimeError: Models won't be available`` and every
        # EN-feed item degrades to the ``[Partially translated]``
        # marker (root cause of the partially-untranslated live feed
        # on 2026-05-21). Once the venv is cached the torch wheel sits
        # inside ``.venv/lib/…`` so the cache-hit path skips the
        # re-download (~750 MB saved per cycle tick).
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install "pip<27"
          .venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -r requirements.txt

      - name: Prepend venv to PATH
        # Persists across subsequent steps; ``$GITHUB_PATH`` is the
        # documented mechanism for cross-step PATH mutation.
        run: echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # Self-healing torch backstop. The cache-key fix above closes the
      # drift channel that left ``torch`` missing from cached venvs
      # after PR #1600, but it only takes effect when the workflow
      # file itself changes. This idempotent step is the second layer:
      # ``pip install torch …`` is a no-op (~1-2 s) when torch is
      # already installed at the requested version, so it costs almost
      # nothing on the healthy path. If a cached venv ever ends up
      # missing torch again (silent cache restoration of an older
      # pre-torch venv from a branch with a hash-collision, a future
      # refactor that drops torch from the install step, an
      # actions/cache restore-keys widening, …), this step heals it
      # before the feed-build step runs and writes ``[Partially
      # translated]`` markers into ``docs/feed.en.xml``. The ``--index-url``
      # pin keeps the CPU-only wheel; without it pip would resolve
      # against PyPI default and pull the multi-GiB CUDA build.
      - name: Ensure torch CPU wheel is present (self-healing)
        shell: bash
        run: |
          set -uo pipefail
          # Healthy path: torch is already in the cached venv, so the
          # import check short-circuits with ZERO network I/O. Previously
          # this step ran an unconditional ``pip install`` on EVERY tick,
          # so a transient ``download.pytorch.org`` outage red-badged the
          # project's most important workflow even though torch was fine.
          if python -c "import torch" 2>/dev/null; then
            echo "torch already present — skipping reinstall (no network)."
            exit 0
          fi
          # Genuinely missing: install the CPU-only wheel with a short
          # retry so an index blip doesn't fail the tick. The ``--index-url``
          # pin keeps the CPU wheel (else pip pulls the multi-GiB CUDA build).
          for attempt in 1 2 3; do
            if pip install torch --index-url https://download.pytorch.org/whl/cpu; then
              echo "torch installed on attempt ${attempt}/3."
              exit 0
            fi
            echo "::warning title=torch-install::install attempt ${attempt}/3 failed; retrying."
            sleep "$((attempt * 3))"
          done
          # Soft degradation, never a hard fail: without torch the EN feed
          # shows "[Partially translated]" for THIS tick only; the next
          # tick self-heals. Far better than aborting the whole cycle.
          echo "::warning title=torch-install::torch still missing after 3 attempts; EN feed may degrade to [Partially translated] this tick (next tick self-heals)."
          exit 0

      # ----- Cache fetchers (free APIs, no quota gate) ---------------------

      # Parallel free-API fetchers (replaces three sequential
      # ``continue-on-error: true`` steps). Wiener Linien, ÖBB and the
      # Stadt-Wien-OGD Baustellen API are independent upstreams — no
      # shared rate limit, no shared connection pool — and each script
      # writes to its own ``cache/<provider>_<hash>/events.json`` so
      # concurrent execution is race-free. Wall-clock ~30 s vs ~90 s
      # sequential; preserves the same best-effort semantics (a failed
      # fetcher leaves the last committed cache in place and the
      # downstream ``feed build`` reads what is on disk). Per-fetcher
      # exit codes surface as ``::warning::`` annotations so a silent
      # upstream outage stays operator-visible — the previous
      # ``continue-on-error: true`` raised an orange badge per failed
      # step; the warning emits the same operator-visible signal here.
      - name: Refresh free-API caches in parallel
        if: steps.freshness.outputs.should_run == 'true'
        # Defense-in-depth step ceiling. The per-process ``timeout 90``
        # wrappers below catch a single hung fetcher (their exit code
        # 124 surfaces via the report() ``::warning::`` annotation, so
        # the other two fetchers' caches still refresh on the same
        # tick). This step-level ``timeout-minutes: 3`` is the fallback
        # if ALL three processes hang past their per-process budget
        # OR if the ``wait`` plumbing itself misbehaves (e.g. a bash
        # job-control quirk). 3 min ≈ ``90s parallel + reporting`` —
        # comfortably above the per-process ceiling but tight enough
        # to leave 7 min of the job's 10-min budget for VAO + feed
        # build + commit. Healthy ticks finish this step in ~30s.
        timeout-minutes: 3
        run: |
          set +e

          log_dir="$RUNNER_TEMP/fetcher-logs"
          mkdir -p "$log_dir"

          # Per-process Slowloris-defence wrapper. ``timeout`` (GNU
          # coreutils, ships on ubuntu-latest) sends SIGTERM after 90s
          # and follows up with SIGKILL 10s later via ``--kill-after``
          # so a fetcher stuck in an uninterruptible C-extension call
          # (e.g. a hung HTTPS socket below urllib3's Python-layer
          # read deadline) cannot survive the SIGTERM-ignore path.
          # Exit code 124 = SIGTERM-on-timeout, 137 = SIGKILL — the
          # report() helper prints both via the existing ``(exit ${rc})``
          # annotation so operators see ``::warning::`` lines for the
          # killed fetcher. 90s budget covers the WORST documented
          # legitimate run (WL: 2 endpoints × ~25s timeout × app-retry
          # ≈ 60-80s under heavy upstream retry-load); healthy fetchers
          # finish in <10s.
          timeout --kill-after=10 90 python scripts/update_wl_cache.py         > "$log_dir/wl.log"         2>&1 &
          pid_wl=$!
          timeout --kill-after=10 90 python scripts/update_oebb_cache.py       > "$log_dir/oebb.log"       2>&1 &
          pid_oebb=$!
          timeout --kill-after=10 90 python scripts/update_baustellen_cache.py > "$log_dir/baustellen.log" 2>&1 &
          pid_baustellen=$!

          wait "$pid_wl";         rc_wl=$?
          wait "$pid_oebb";       rc_oebb=$?
          wait "$pid_baustellen"; rc_baustellen=$?

          report() {
            local name=$1
            local rc=$2
            echo "::group::${name} fetcher (exit ${rc})"
            cat "$log_dir/${name}.log"
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              echo "::warning title=${name} cache fetcher::non-zero exit (${rc}) — last committed cache will be used by feed build."
            fi
          }

          report wl         "$rc_wl"
          report oebb       "$rc_oebb"
          report baustellen "$rc_baustellen"

          # Best-effort: never fail the workflow on individual fetcher
          # errors. Mirrors the previous per-step ``continue-on-error: true``.
          exit 0

      # ----- Stammstrecke (VOR /trip — the single quota-gated API) --------

      # Defense-in-depth pre-flight: read the persisted VAO daily
      # counter (``data/vor_request_count.json``) and SKIP the
      # Stammstrecke poll when a fresh run would breach the
      # contractual 100/day cap. The in-script ``_charge_one_request``
      # guard is still active as a second-layer enforcer; this
      # preflight makes the budget-exhausted state explicit at the
      # top of the workflow log so operators can spot it without
      # scraping the script's DEBUG output.
      #
      # ``--margin 1`` mirrors the SINGLE ``/departureBoard`` request
      # the Hauptbahnhof-based monitor makes per cron tick. (Pre-2026-
      # 05-15 the legacy ``update_stammstrecke_status.py`` made TWO
      # ``/trip`` calls per tick — one per direction — and the margin
      # was 2.)
      - name: VAO quota pre-flight
        id: vor_preflight
        if: steps.freshness.outputs.should_run == 'true'
        # ``continue-on-error: true`` — the preflight script
        # intentionally exits 1 when the budget is exhausted. We do
        # NOT want that to fail the workflow; instead the conditional
        # gate on ``steps.vor_preflight.outputs.quota_ok`` controls
        # the API step below.
        continue-on-error: true
        run: python scripts/preflight_quota_check.py --check vor --margin 1

      # Stammstrecke delay monitor. Since 2026-05-15 uses
      # ``/departureBoard`` at Wien Hauptbahnhof
      # (``update_stammstrecke_hbf.py``) which lifts the ``numF=6``
      # capture ceiling that the legacy ``/trip``-based
      # ``update_stammstrecke_status.py`` inherited from the VAO API.
      # One ``/departureBoard`` poll returns ALL Stammstrecke trains
      # in the 45-min duration window — a single API call per tick
      # covers both directions (south = Meidling, north = Praterstern;
      # the pre-2026-05-15 north label was "Floridsdorf" — see the
      # rename rationale in update_stammstrecke_hbf.py), classified
      # via terminus whitelists. Rollback path: swap the
      # script name back to ``update_stammstrecke_status.py`` and
      # bump ``--margin`` above to ``2``.
      - name: Refresh Stammstrecke status
        if: ${{ steps.vor_preflight.outputs.quota_ok == 'true' }}
        continue-on-error: true
        run: python scripts/update_stammstrecke_hbf.py

      # ----- Feed build (no API call — pure consumer of caches) -----------

      - name: Build feed
        if: steps.freshness.outputs.should_run == 'true'
        # Step ceiling below the 10-min job cap so a hung builder (e.g. a
        # stalled translation-pipeline call) is killed fast and still
        # leaves budget for the publish step. Healthy builds finish well
        # under a minute.
        timeout-minutes: 5
        shell: bash
        run: |
          # Atom self/alternate links are written by the Python builder.
          # Derive the GitHub Pages base from the always-present
          # ``$GITHUB_REPOSITORY`` / ``$GITHUB_REPOSITORY_OWNER`` runner
          # env vars rather than ``${{ github.event.repository.name }}``:
          # the event payload is empty on ``schedule`` events (the new
          # backup-cron trigger), which would otherwise emit a broken
          # ``https://owner.github.io/`` with no repo segment. Forks
          # inherit their own repo, so atom:link URLs stay correct
          # instead of pointing at the upstream repo.
          export PAGES_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          python -m src.cli feed build

      # ----- README + dashboard render (no API call) ----------------------

      # Cadence split: the README STATS markers refresh on every
      # ~30-min cycle tick (the snapshot covers the trailing 30 days,
      # so a half-hour staleness window is the operator-visible
      # budget). ``docs/statistik.md`` is the *yearly* dashboard —
      # its values only meaningfully change once per day, so writing
      # it 48× a day was pure churn (each tick refreshed the
      # ``_Automatisch erzeugt am ..._`` timestamp at the top of the
      # file and triggered a commit). The gate below pins the
      # dashboard write to the first cycle tick after midnight
      # Europe/Vienna: ``TZ=Europe/Vienna date +%H%M`` is DST-correct
      # (the env var rebinds the active zone for that single ``date``
      # invocation), and the ``-lt 30`` window absorbs up to ~29 min
      # of IFTTT/dispatch trigger jitter on the 00:00 Vienna tick. If
      # a tick is delayed beyond that window the dashboard misses
      # one day; the next day's tick catches up. The README markers
      # are unaffected.
      - name: Refresh statistics dashboard and README snapshot
        if: steps.freshness.outputs.should_run == 'true'
        # Cosmetic and non-critical: the README markers + yearly dashboard
        # are nice-to-have, NOT the deliverable (``docs/feed.xml`` is).
        # The step runs BEFORE the commit so its output rides the same
        # atomic commit, but a crash here must NEVER abort the job and
        # block the feed publish (which is exactly what happened without
        # this guard: the sequential job aborted before the commit step).
        # ``continue-on-error`` surfaces a failure as an orange annotation
        # while letting the feed publish proceed; the README simply stays
        # one tick stale until the stats script is healthy again.
        continue-on-error: true
        timeout-minutes: 2
        run: |
          vienna_hhmm=$(TZ=Europe/Vienna date +%H%M)
          if [ "$vienna_hhmm" -lt 30 ]; then
            echo "Vienna-local $vienna_hhmm — refreshing dashboard + README markers."
            python scripts/generate_markdown_stats.py
          else
            echo "Vienna-local $vienna_hhmm — README-only tick (dashboard skipped)."
            python scripts/generate_markdown_stats.py --skip-dashboard
          fi

      # ----- Validate + single atomic publish ----------------------------

      # ONE never-fail step does the whole publish: validate the built
      # feed, stage everything, commit, and push with retry + concurrent-
      # push reconcile folded in. This is the MOST IMPORTANT workflow in
      # the project (the live feed's ~30-min heartbeat) and must never go
      # red on a transient infrastructure blip.
      #
      # Why inline ``git`` and not an external commit action: a ``uses:``
      # action is resolved and DOWNLOADED by the runner in the "Prepare
      # all required actions" setup phase, BEFORE the first step runs;
      # when codeload.github.com hiccups, that download fails and the
      # whole job dies in setup — before any retry/fallback could run.
      # (Observed 2026-05-26 12:30 UTC: ``git-auto-commit-action`` 404'd
      # from codeload "after 1 attempts" and the entire tick was lost.)
      # A ``uses:`` download cannot be retried from inside the job, so the
      # only robust fix is to not depend on one: ``git`` is pre-installed,
      # needs no download, and lets us own the retry + never-fail logic.
      # The remaining ``uses:`` actions (checkout / setup-python / cache)
      # are first-party and the cycle is idempotent, so a rare setup-phase
      # miss on those self-heals on the next tick (and the hourly backup
      # cron is the additional net for a fully-lost tick).
      #
      # Robustness contract:
      #   * VALIDATE first — if the built feed XML is malformed or empty,
      #     skip the publish entirely (warning + exit 0) so a builder
      #     hiccup can never push corruption over the last-good feed.
      #   * ``git add -A`` — stage every workspace output (caches, CSV
      #     ledgers, quota counter, feed XMLs, first_seen state,
      #     statistik.md, README, feed-health, any future output).
      #   * no changes -> clean no-op (exit 0).
      #   * push with up to 4 attempts and exponential backoff (2/4/8 s).
      #     The first push reconciles implicitly; on a non-fast-forward
      #     (a concurrent push from update-stations.yml / seo-guard.yml,
      #     which share no concurrency lane with this workflow) the loop
      #     does ``git pull --rebase`` to replay our commit and retries.
      #     ``--force-with-lease`` is preserved; the re-fetch refreshes the
      #     lease so the replayed commit fast-forwards. Rebase conflicts
      #     resolve to the locally-built regeneration; ``merge=union`` CSV
      #     ledgers never conflict. (This folds in the former separate
      #     "Pull concurrent remote changes" step and removes its hard
      #     ``exit 1`` path — the last red path in the publish sequence.)
      #   * if every attempt fails -> warning + exit 0. The just-built
      #     outputs are NOT published this tick, but the repo keeps the
      #     last good commit and the next tick rebuilds from fresh caches.
      #     A skipped publish is ~30 min of staleness; a red workflow would
      #     be worse and would page the operator for a non-actionable blip.
      - name: Validate and publish cycle outputs
        shell: bash
        env:
          # Keep ``git rebase --continue`` non-interactive (it would
          # otherwise open an editor for the replayed commit message).
          GIT_EDITOR: 'true'
          # Abort a stalled push/pull transfer (< 1 KB/s for 30 s) instead
          # of letting a hung socket ride up to the 10-min job ceiling.
          GIT_HTTP_LOW_SPEED_LIMIT: '1000'
          GIT_HTTP_LOW_SPEED_TIME: '30'
        run: |
          # NOTE: intentionally NO ``-e`` — every failure below is handled
          # explicitly so the step can guarantee exit 0.
          set -uo pipefail

          # 1) Pre-publish sanity gate. Never ship a malformed or empty
          #    feed: if the builder exited 0 but wrote garbage, keep the
          #    last-good feed online and skip this tick (next tick rebuilds).
          for feed in docs/feed.xml docs/feed.en.xml; do
            [ -f "${feed}" ] || continue
            if [ ! -s "${feed}" ]; then
              echo "::warning title=feed-validate::${feed} is empty — skipping publish this tick (last-good feed stays online)."
              exit 0
            fi
            if ! python -c "import sys, xml.etree.ElementTree as ET; ET.parse(sys.argv[1])" "${feed}"; then
              echo "::warning title=feed-validate::${feed} is not well-formed XML — skipping publish this tick (last-good feed stays online)."
              exit 0
            fi
          done

          # 2) Stage + commit. ``git add -A`` mirrors the former action's
          #    ``add_options: -A``; the bot identity was configured up front.
          git add -A
          if git diff --cached --quiet; then
            echo "Cycle produced no changes — nothing to commit or push."
            exit 0
          fi
          git commit -m "chore: update cycle"

          # 3) Push with retry + concurrent-push reconcile + never-fail.
          branch="${GITHUB_REF_NAME}"
          max_attempts=4
          delay=2
          attempt=1
          while :; do
            if git push --force-with-lease origin "HEAD:${branch}"; then
              echo "Cycle outputs published on attempt ${attempt}/${max_attempts}."
              exit 0
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::warning title=cycle-publish::git push failed after ${max_attempts} attempts; this tick's outputs were NOT published. The repo keeps the last good commit and the next tick will rebuild and publish from fresh caches. Not failing the workflow."
              exit 0
            fi
            echo "Push attempt ${attempt}/${max_attempts} failed; re-syncing with origin/${branch} and retrying in ${delay}s."
            sleep "${delay}"
            # Re-sync onto any concurrent push and replay our commit;
            # tolerate a transient fetch failure (network blip) and just
            # retry the push after the backoff.
            if ! git pull --rebase --autostash origin "${branch}"; then
              # A rebase replay can stop on a conflict. Every cycle output
              # is a full regeneration, so the locally-built copy (the
              # commit being replayed = "theirs" in rebase terms) wins.
              # ``merge=union`` CSV ledgers auto-resolve and never reach here.
              mapfile -t -d '' conflicts < <(git diff --name-only --diff-filter=U -z)
              if [ "${#conflicts[@]}" -gt 0 ]; then
                echo "::warning title=cycle-reconcile::rebase conflict on a concurrent push; keeping locally-built copies for: ${conflicts[*]}"
                git checkout --theirs -- "${conflicts[@]}"
                git add -- "${conflicts[@]}"
                git rebase --continue || git rebase --abort || true
              else
                # Not a conflict (the fetch itself failed) — abort any
                # half-started rebase and just retry the push.
                git rebase --abort 2>/dev/null || true
              fi
            fi
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
