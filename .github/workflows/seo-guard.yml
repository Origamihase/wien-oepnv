name: SEO Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  push:
    paths:
      - "docs/**"
      - ".github/workflows/seo-guard.yml"
      - "scripts/generate_sitemap.py"
      - "scripts/generate_llms_txt.py"

permissions:
  contents: read

concurrency:
  group: seo-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    # Defense-in-depth ceiling: the SEO guard regenerates the sitemap
    # (sub-second), verifies the feed structure (sub-second), patches
    # the GitHub repo metadata (single curl PATCH), and waits up to 6x
    # ~10 s for the published feed via curl + grep. 10 min gives ample
    # headroom while catching hangs (stuck PATCH, stuck published-feed
    # poll) quickly. Without the cap the workflow inherits GitHub's
    # 360-min default. Mirrors the canonical defence shape established
    # in update-cycle.yml.
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SITE_BASE: https://origamihase.github.io/wien-oepnv
      DESC: Konsolidierter RSS-Feed für Störungen und Baustellenmeldungen im Wiener ÖPNV (WL/ÖBB/VOR), inkl. Doku & Open-Data-Workflows.
    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Refresh sitemap.xml
        run: python scripts/generate_sitemap.py

      - name: Verify sitemap.xml
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/sitemap.xml ]]; then
            echo "Error: docs/sitemap.xml missing or empty after generation"
            exit 1
          fi

          if ! grep -q '<urlset' docs/sitemap.xml; then
            echo "Error: docs/sitemap.xml is missing the <urlset> root element"
            exit 1
          fi

          url_count="$(grep -c '<loc>' docs/sitemap.xml || true)"
          if [[ "$url_count" -lt 1 ]]; then
            echo "Error: docs/sitemap.xml contains no <loc> entries"
            exit 1
          fi

          if ! grep -qF "<loc>${SITE_BASE}/" docs/sitemap.xml; then
            echo "Error: docs/sitemap.xml does not reference SITE_BASE (${SITE_BASE})"
            exit 1
          fi
          echo "sitemap.xml verification passed (${url_count} URLs)."

      - name: Refresh llms.txt
        run: python scripts/generate_llms_txt.py

      - name: Verify llms.txt
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/llms.txt ]]; then
            echo "Error: docs/llms.txt missing or empty after generation"
            exit 1
          fi

          # llms.txt spec: the file must open with an H1 naming the project.
          if ! head -n 1 docs/llms.txt | grep -q '^# '; then
            echo "Error: docs/llms.txt must start with an '# ' H1 heading"
            head -n 1 docs/llms.txt
            exit 1
          fi

          # Every curated link must live under SITE_BASE (markdown link form
          # is ``[label](${SITE_BASE}/...)`` so the '(' anchors the match).
          if ! grep -qF "(${SITE_BASE}/" docs/llms.txt; then
            echo "Error: docs/llms.txt does not reference SITE_BASE (${SITE_BASE})"
            exit 1
          fi

          link_count="$(grep -c '^- \[' docs/llms.txt || true)"
          if [[ "$link_count" -lt 1 ]]; then
            echo "Error: docs/llms.txt contains no link entries"
            exit 1
          fi
          echo "llms.txt verification passed (${link_count} links)."

      - name: Pull concurrent remote changes
        # Defense against the cross-workflow push race documented in
        # update-cycle.yml's commit step: update-cycle.yml writes to
        # main every few minutes (paths under docs/**), and any of
        # those writes can land between this workflow's checkout and
        # this workflow's push, turning the auto-commit-action's push
        # into a non-fast-forward rejection. Mirrors the established
        # pattern in update-cycle.yml and manual-full-refresh.yml:
        # rebase the locally regenerated sitemap onto the current
        # remote tip first, then push with --force-with-lease so a
        # last-millisecond push from another writer cleanly aborts
        # the push (rather than overwriting) and the run is retried
        # by the next docs/** push that triggers seo-guard.
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          # ``git pull --rebase --autostash`` does NOT fail when the autostash
          # RE-APPLY conflicts (the rebase succeeds, the failed stash apply is
          # only a warning, the step exits 0) — it would hand an UNMERGED
          # index to the auto-commit step, which dies with "you need to
          # resolve your current index first" (the failure fixed for the feed
          # workflows on 2026-05-25). This job only ever modifies
          # docs/sitemap.xml + docs/llms.txt — both fully regenerated above —
          # so on a conflict the locally built copy is authoritative and the
          # conflict set stays within the file_pattern committed below.
          git pull --rebase --autostash

          mapfile -t -d '' conflicts < <(git diff --name-only --diff-filter=U -z)
          if [ "${#conflicts[@]}" -gt 0 ]; then
            echo "::warning title=reconcile::autostash re-apply conflicted on a concurrent push; keeping locally-built copies for: ${conflicts[*]}"
            # In a stash-apply conflict, stage 3 ("--theirs") is the stashed
            # locally-built version; stage 2 is the just-pulled upstream.
            git checkout --theirs -- "${conflicts[@]}"
            git add -- "${conflicts[@]}"
            # A conflicted ``git stash apply`` leaves the autostash entry on
            # the stash stack; drop it so it cannot leak into a later run.
            git stash drop || true
          fi

          # Never hand an unmerged index to the auto-commit step.
          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "::error title=reconcile::unresolved merge conflicts remain after reconcile" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

      - name: Commit sitemap changes
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(seo): refresh sitemap.xml & llms.txt [skip ci]'
          file_pattern: 'docs/sitemap.xml docs/llms.txt'
          push_options: '--force-with-lease'

      - name: Verify feed file (repo) – exactly one self & one alternate
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/feed.xml ]]; then
            echo "docs/feed.xml does not exist or is empty, skipping verification."
            exit 0
          fi

          echo "Verifying docs/feed.xml..."
          self_count="$(grep -c 'atom:link[^>]*rel=\"self\"' docs/feed.xml || true)"
          alt_count="$(grep -c 'atom:link[^>]*rel=\"alternate\"' docs/feed.xml || true)"

          if [[ "$self_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 atom:link rel='self', found $self_count"
            exit 1
          fi

          if [[ "$alt_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 atom:link rel='alternate', found $alt_count"
            exit 1
          fi

          if ! grep -q '<language>de</language>' docs/feed.xml; then
            echo "Error: Missing <language>de</language>"
            exit 1
          fi

          if ! grep -q 'xmlns:atom=' docs/feed.xml; then
            echo "Error: Missing xmlns:atom definition"
            exit 1
          fi
          echo "Feed verification passed."

      - name: Verify robots.txt format and content
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/robots.txt ]]; then
            echo "Error: docs/robots.txt missing or empty"
            exit 1
          fi

          # Genau eine Sitemap-Direktive:
          sitemap_count="$(grep -c '^Sitemap:' docs/robots.txt || true)"
          if [[ "$sitemap_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 Sitemap directive, found $sitemap_count"
            cat docs/robots.txt
            exit 1
          fi

          # Sitemap-Direktive zeigt auf SITE_BASE:
          if ! grep -qF "Sitemap: ${SITE_BASE}/sitemap.xml" docs/robots.txt; then
            echo "Error: Sitemap directive does not match expected: Sitemap: ${SITE_BASE}/sitemap.xml"
            cat docs/robots.txt
            exit 1
          fi

          # Keine führenden Whitespaces auf nicht-leeren Zeilen:
          if grep -qE '^[[:space:]]+[^[:space:]]' docs/robots.txt; then
            echo "Error: Found lines with leading whitespace"
            grep -nE '^[[:space:]]+[^[:space:]]' docs/robots.txt
            exit 1
          fi
          echo "robots.txt verification passed."

      - name: Update repository metadata via PAT (description & homepage)
        env:
          ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          SITE_BASE: ${{ env.SITE_BASE }}
          DESC: ${{ env.DESC }}
          # Security: pipe github.repository through env, not direct
          # ``${{ … }}`` interpolation, so the value can never escape
          # the shell context as a metacharacter (defence-in-depth — the
          # GitHub-provided slug is grammar-constrained, but every
          # template expansion in a shell ``run:`` block is a latent
          # injection vector if a future change ever hands user input to
          # this step).
          OWNER_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ADMIN_TOKEN:-}" ]]; then
            echo "REPO_ADMIN_TOKEN fehlt – Metadaten können nicht gesetzt werden." >&2
            exit 0
          fi
          # Build the JSON body with jq so values containing quotes,
          # backslashes or other special characters are escaped according
          # to JSON rules (printf %q produces shell-quoted output, not
          # JSON-quoted, and would break on values like O'Reilly).
          body="$(jq -nc \
            --arg description "${DESC}" \
            --arg homepage "${SITE_BASE}/" \
            '{description: $description, homepage: $homepage}')"
          curl -sS -H "Authorization: Bearer ${ADMIN_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               -X PATCH "https://api.github.com/repos/${OWNER_REPO}" \
               -d "$body" >/dev/null

      - name: Verify published feed (best-effort; allow Pages delay)
        # Security: re-export the workflow-level SITE_BASE into a step env
        # so the shell below can dereference ``$SITE_BASE`` instead of
        # ``${{ env.SITE_BASE }}``. Same rationale as the PATCH step above:
        # template expansion runs before bash parses the script, so a
        # future user-influenced value would otherwise become a shell
        # injection primitive.
        env:
          SITE_BASE: ${{ env.SITE_BASE }}
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..6}; do
            if curl -fsSL "${SITE_BASE}/feed.xml" -o /tmp/pub.xml; then
              if grep -q '<language>de</language>' /tmp/pub.xml \
                 && [ "$(grep -c 'atom:link[^>]*rel=\"self\"' /tmp/pub.xml)" -eq 1 ] \
                 && [ "$(grep -c 'atom:link[^>]*rel=\"alternate\"' /tmp/pub.xml)" -eq 1 ]; then
                echo "Published feed OK"
                exit 0
              fi
            fi
            sleep 10
          done
          echo "WARN: Published feed noch nicht synchron; Repository-Datei ist korrekt."
