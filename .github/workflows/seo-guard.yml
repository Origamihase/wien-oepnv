name: SEO Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  push:
    paths:
      - "docs/**"
      - ".github/workflows/seo-guard.yml"
      - "scripts/generate_sitemap.py"

permissions:
  contents: read

concurrency:
  group: seo-guard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SITE_BASE: https://origamihase.github.io/wien-oepnv
      DESC: Konsolidierter RSS-Feed für Störungen und Baustellenmeldungen im Wiener ÖPNV (WL/ÖBB/VOR), inkl. Doku & Open-Data-Workflows.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Refresh sitemap.xml
        shell: bash
        run: |
          set -uxo pipefail
          python --version
          python -c "import sys; print('sys.path:', sys.path)"
          echo "--- docs/ contents ---"
          ls -la docs/ || true
          echo "--- generate_sitemap.py run ---"
          python scripts/generate_sitemap.py
          rc=$?
          echo "--- exit rc=$rc ---"
          ls -la docs/sitemap.xml || true
          exit $rc

      - name: Verify sitemap.xml
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/sitemap.xml ]]; then
            echo "Error: docs/sitemap.xml missing or empty after generation"
            exit 1
          fi

          if ! grep -q '<urlset' docs/sitemap.xml; then
            echo "Error: docs/sitemap.xml is missing the <urlset> root element"
            exit 1
          fi

          url_count="$(grep -c '<loc>' docs/sitemap.xml || true)"
          if [[ "$url_count" -lt 1 ]]; then
            echo "Error: docs/sitemap.xml contains no <loc> entries"
            exit 1
          fi

          if ! grep -qF "<loc>${SITE_BASE}/" docs/sitemap.xml; then
            echo "Error: docs/sitemap.xml does not reference SITE_BASE (${SITE_BASE})"
            exit 1
          fi
          echo "sitemap.xml verification passed (${url_count} URLs)."

      - name: Commit sitemap changes
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(seo): refresh sitemap.xml [skip ci]'
          file_pattern: 'docs/sitemap.xml'

      - name: Verify feed file (repo) – exactly one self & one alternate
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/feed.xml ]]; then
            echo "docs/feed.xml does not exist or is empty, skipping verification."
            exit 0
          fi

          echo "Verifying docs/feed.xml..."
          self_count="$(grep -c 'atom:link[^>]*rel=\"self\"' docs/feed.xml || true)"
          alt_count="$(grep -c 'atom:link[^>]*rel=\"alternate\"' docs/feed.xml || true)"

          if [[ "$self_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 atom:link rel='self', found $self_count"
            exit 1
          fi

          if [[ "$alt_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 atom:link rel='alternate', found $alt_count"
            exit 1
          fi

          if ! grep -q '<language>de</language>' docs/feed.xml; then
            echo "Error: Missing <language>de</language>"
            exit 1
          fi

          if ! grep -q 'xmlns:atom=' docs/feed.xml; then
            echo "Error: Missing xmlns:atom definition"
            exit 1
          fi
          echo "Feed verification passed."

      - name: Verify robots.txt format and content
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s docs/robots.txt ]]; then
            echo "Error: docs/robots.txt missing or empty"
            exit 1
          fi

          # Genau eine Sitemap-Direktive:
          sitemap_count="$(grep -c '^Sitemap:' docs/robots.txt || true)"
          if [[ "$sitemap_count" -ne 1 ]]; then
            echo "Error: Expected exactly 1 Sitemap directive, found $sitemap_count"
            cat docs/robots.txt
            exit 1
          fi

          # Sitemap-Direktive zeigt auf SITE_BASE:
          if ! grep -qF "Sitemap: ${SITE_BASE}/sitemap.xml" docs/robots.txt; then
            echo "Error: Sitemap directive does not match expected: Sitemap: ${SITE_BASE}/sitemap.xml"
            cat docs/robots.txt
            exit 1
          fi

          # Keine führenden Whitespaces auf nicht-leeren Zeilen:
          if grep -qE '^[[:space:]]+[^[:space:]]' docs/robots.txt; then
            echo "Error: Found lines with leading whitespace"
            grep -nE '^[[:space:]]+[^[:space:]]' docs/robots.txt
            exit 1
          fi
          echo "robots.txt verification passed."

      - name: Update repository metadata via PAT (description & homepage)
        env:
          ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          SITE_BASE: ${{ env.SITE_BASE }}
          DESC: ${{ env.DESC }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ADMIN_TOKEN:-}" ]]; then
            echo "REPO_ADMIN_TOKEN fehlt – Metadaten können nicht gesetzt werden." >&2
            exit 0
          fi
          OWNER_REPO="${{ github.repository }}"
          curl -sS -H "Authorization: Bearer ${ADMIN_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               -X PATCH "https://api.github.com/repos/${OWNER_REPO}" \
               -d "$(printf '{"description":%q,"homepage":%q}' "${DESC}" "${SITE_BASE}/")" >/dev/null

      - name: Verify published feed (best-effort; allow Pages delay)
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..6}; do
            if curl -fsSL "${{ env.SITE_BASE }}/feed.xml" -o /tmp/pub.xml; then
              if grep -q '<language>de</language>' /tmp/pub.xml \
                 && [ "$(grep -c 'atom:link[^>]*rel=\"self\"' /tmp/pub.xml)" -eq 1 ] \
                 && [ "$(grep -c 'atom:link[^>]*rel=\"alternate\"' /tmp/pub.xml)" -eq 1 ]; then
                echo "Published feed OK"
                exit 0
              fi
            fi
            sleep 10
          done
          echo "WARN: Published feed noch nicht synchron; Repository-Datei ist korrekt."
