name: Update Wiener Linien cache

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ensure pip cache directory exists
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/pip-cache"
          mkdir -p "$cache_dir"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "PIP_CACHE_DIR<<$EOF" >> "$GITHUB_ENV"
          echo "$cache_dir" >> "$GITHUB_ENV"
          echo "$EOF" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'chore: update Wiener Linien cache'
          file_pattern: 'cache/wl*/events.json'
