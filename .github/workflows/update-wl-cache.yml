name: Update Wiener Linien cache

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Ensure pip cache directory exists
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/pip-cache"
          mkdir -p "$cache_dir"
          echo "PIP_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'chore: update Wiener Linien cache'
          file_pattern: 'cache/wl*/events.json'
