name: Update Wiener Linien cache

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ensure pip cache directory exists
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/pip-cache"
          mkdir -p "$cache_dir"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "PIP_CACHE_DIR<<$EOF" >> "$GITHUB_ENV"
          echo "$cache_dir" >> "$GITHUB_ENV"
          echo "$EOF" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Pin pip<26 vorsorglich gegen unerwartete Breaking Changes in pip 26.x.
          # pip 26.0 ist seit 2026-01 released, 26.1 seit 2026-04 — Kompatibilität
          # mit unseren Deps (defusedxml, openpyxl, dnspython) noch nicht durchgetestet.
          # Re-evaluate als eigener Followup-PR. Letzte Prüfung: 2026-05-01.
          python -m pip install "pip<26"
          pip install -r requirements.txt

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: update Wiener Linien cache'
          file_pattern: 'cache/wl*/events.json'
