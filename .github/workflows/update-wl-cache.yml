name: Update Wiener Linien cache

# DISABLED CRON (2026-05-09): the regular ``10,40`` schedule was
# replaced by ``update-cycle.yml``, a single-job sequential pipeline
# that runs every cache fetcher + the feed composer in one runner.
# The cycle is driven by the IFTTT ``ifttt_feed_trigger``
# repository_dispatch event (~30-min cadence, lands on :00/:30) —
# see the header of update-cycle.yml for the trigger model.
# This workflow remains as a ``workflow_dispatch``-only escape hatch
# for manually re-fetching the WL cache between regular cycle runs.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: external-api-fetch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure pip cache directory exists
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="${RUNNER_TEMP}/pip-cache"
          mkdir -p "$cache_dir"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "PIP_CACHE_DIR<<$EOF" >> "$GITHUB_ENV"
          echo "$cache_dir" >> "$GITHUB_ENV"
          echo "$EOF" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Refresh Wiener Linien cache
        run: python scripts/update_wl_cache.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: update Wiener Linien cache'
          file_pattern: 'cache/wl*/events.json'
