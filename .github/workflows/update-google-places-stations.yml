name: Update Google Places Stations

on:
  schedule:
    - cron: '0 6 1,11,21 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
      GOOGLE_ACCESS_ID: ${{ secrets.GOOGLE_ACCESS_ID }}
      PLACES_INCLUDED_TYPES: train_station,subway_station,bus_station
      PLACES_RADIUS_M: 2500
      PLACES_MAX_RESULTS: 20
      PLACES_RANK_PREFERENCE: POPULARITY
      # Deprecated fallback: GOOGLE_MAPS_API_KEY remains supported but should be migrated.
      PLACES_LIMIT_TOTAL: 4000
      PLACES_LIMIT_NEARBY: 1500
      PLACES_LIMIT_TEXT: 1500
      PLACES_LIMIT_DETAILS: 1000
      PLACES_QUOTA_STATE: data/places_quota.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Check GOOGLE_ACCESS_ID presence
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_ACCESS_ID:-}" ]; then
            echo "Missing GOOGLE_ACCESS_ID"; exit 2;
          fi

      # Defense-in-depth pre-flight: read the persisted Google Places
      # monthly counter (``data/places_quota.json``) and SKIP every
      # subsequent API-firing step (smoke preflight + nearby preflight +
      # full fetch) when a fresh run would breach the contractual
      # ``PLACES_LIMIT_TOTAL`` cap. The in-script ``MonthlyQuota.consume``
      # guard (``src/places/quota.py:226``) is still active as a
      # second-layer enforcer; this preflight prevents the curl-based
      # smoke / nearby steps from billing requests against the API
      # *before* the Python client has a chance to enforce its own gate.
      # ``--margin 2`` mirrors the two curl preflights below; raise it
      # if more pre-fetch probes are added.
      - name: Places quota pre-flight
        id: places_preflight
        continue-on-error: true
        run: |
          python scripts/preflight_quota_check.py --check places \
            --margin 2 --limit-override "${PLACES_LIMIT_TOTAL:-4000}"

      - name: Places preflight
        if: ${{ steps.places_preflight.outputs.quota_ok == 'true' }}
        run: |
          set -euo pipefail
          body='{"textQuery":"Wien Hauptbahnhof","languageCode":"de","regionCode":"AT"}'
          # Bis zu 3 Versuche, kurze Backoffs
          for i in 1 2 3; do
            if curl -fsS -X POST "https://places.googleapis.com/v1/places:searchText" \
                 -H "Content-Type: application/json" \
                 -H "X-Goog-Api-Key: $GOOGLE_ACCESS_ID" \
                 -H "X-Goog-FieldMask: places.id" \
                 --max-time 20 \
                 --data "$body" >/dev/null; then
              echo "Preflight OK"; exit 0
            fi
            echo "Preflight attempt $i failed; retrying..." >&2
            sleep $((i*3))
          done
          echo "Preflight failed after retries." >&2
          exit 1

      - name: Places nearby preflight
        if: ${{ steps.places_preflight.outputs.quota_ok == 'true' }}
        run: |
          set -euo pipefail
          body='{
            "languageCode":"de",
            "includedTypes":["train_station"],
            "maxResultCount": 1,
            "locationRestriction":{
              "circle":{"center":{"latitude":48.20849,"longitude":16.37208},"radius":1500}
            }
          }'
          curl -fsS -X POST "https://places.googleapis.com/v1/places:searchNearby" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $GOOGLE_ACCESS_ID" \
            -H "X-Goog-FieldMask: places.id,places.displayName,places.location" \
            --max-time 20 \
            --data "$body" >/dev/null
          echo "Nearby preflight OK"

      - name: Nearby debug (only if needed)
        if: ${{ failure() && steps.places_preflight.outputs.quota_ok == 'true' }}
        run: |
          set -euo pipefail
          body='{"languageCode":"de","includedTypes":["train_station"],"maxResultCount":1,
                 "locationRestriction":{"circle":{"center":{"latitude":48.20849,"longitude":16.37208},"radius":1500}}}'
          curl -sS -X POST "https://places.googleapis.com/v1/places:searchNearby" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $GOOGLE_ACCESS_ID" \
            -H "X-Goog-FieldMask: places.id,places.displayName,places.location" \
            --data "$body" -w "\nHTTP %{http_code}\n"

      - name: Fetch Google Places stations
        if: ${{ steps.places_preflight.outputs.quota_ok == 'true' }}
        run: |
          python scripts/fetch_google_places_stations.py --write --dump-new data/new_places.json

      - name: Upload new places artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: google-places-new
          path: data/new_places.json
          if-no-files-found: ignore

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          if [ -f data/stations.json ]; then
            git add data/stations.json
          fi
          if [ -f data/new_places.json ]; then
            git add data/new_places.json
          fi
          if [ -f data/places_quota.json ]; then
            git add data/places_quota.json
          fi
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'chore: update Google Places stations'
            git pull --rebase --autostash
            git push
          fi
