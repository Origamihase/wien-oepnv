name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: Run test suite
    runs-on: ubuntu-latest
    # Defense-in-depth ceiling: the full pytest suite (~8000 tests +
    # static checks + station validation + Overpass smoke check) runs
    # in 4-6 min locally and 6-10 min on a GH runner. 20 min gives ~2x
    # headroom while catching hangs (stuck test, infinite recursion,
    # runaway fixture) quickly. The per-test pytest-timeout (60 s in
    # pyproject.toml) is a finer-grained gate; the job-level cap is the
    # defence-in-depth backstop. Without the cap the workflow inherits
    # GitHub's 360-min default. Mirrors update-cycle.yml.
    timeout-minutes: 20

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        uses: ./.github/actions/install-deps
        with:
          requirements: requirements-dev.txt

      - name: Run static checks
        run: python scripts/run_static_checks.py

      - name: Validate stations
        run: python scripts/validate_stations.py

      - name: Overpass smoke check (advisory)
        # Probes the upstream Overpass mirror. Tests don't depend on Overpass
        # — :class:`OSMOverpassClient` is mocked everywhere — so this step
        # never fails the job; it just surfaces a warning when the mirror is
        # degraded so flaky integration runs are easier to attribute.
        run: python scripts/check_overpass_status.py --allow-skip --verbose
        continue-on-error: true

      - name: Run pytest
        run: python -m pytest --cov --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
          if-no-files-found: warn
