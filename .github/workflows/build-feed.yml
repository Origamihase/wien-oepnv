name: Build feed

# DISABLED CRON (2026-05-09): the regular ``15,45`` schedule was
# replaced by ``update-cycle.yml``, a single-job sequential pipeline
# whose ``feed build`` step runs after every cache fetcher in the
# same runner — the in-runner step order (not a staggered cron)
# drives the timing. The pipeline is triggered by the IFTTT
# ``ifttt_feed_trigger`` repository_dispatch event (~30-min cadence;
# see header of update-cycle.yml).
#
# This workflow remains as the code-change verification path: a push
# to ``src/**`` etc. rebuilds the feed from whatever caches are
# currently on main, without firing any upstream API. The
# ``workflow_dispatch`` trigger lets operators force a rebuild after
# a manual cache refresh.
#
# Both retained triggers go through the same single job below, which
# reads only on-disk artefacts (caches + Stammstrecke CSV ledger)
# and never calls any upstream API or provider itself.
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-feed.yml'

permissions:
  contents: read

# Concurrency lane. On ``main`` this workflow commits ``chore: rebuild
# feed`` — touching ``data/first_seen.json`` and the feed XMLs — to the
# SAME branch that ``update-cycle.yml`` and ``manual-full-refresh.yml``
# push to. Those run in the ``external-api-fetch`` group; if this workflow
# kept its own lane it could push to ``main`` WHILE a cycle tick is
# mid-build, and the cycle's ``git pull --rebase --autostash`` would then
# re-apply its autostash on top of our just-pushed ``first_seen.json`` —
# leaving an unmerged index that crashed the cycle's auto-commit (observed
# 2026-05-25). Sharing ``external-api-fetch`` on ``main`` serialises the
# three feed-writing workflows so two of them can never race the same pull
# window. Non-``main`` (PR / branch) builds keep their own per-ref lane —
# they only verify code changes and never push (see the
# ``if: github.ref == 'refs/heads/main'`` guards on the commit steps), so
# they stay parallel and fast.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'external-api-fetch' || format('build-feed-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Defense-in-depth ceiling: a healthy feed build (cache miss for HF +
    # pip + feed compose + EN translation pass) runs in 8-12 min. The
    # cache-hit path is much faster (~3 min). 20 min gives ~2x headroom
    # over the slowest legitimate cold-cache run while catching hangs
    # (stuck network fetch, hung translation pipeline) quickly. Without
    # the cap the workflow inherits GitHub's 360-min default. Mirrors the
    # canonical defence shape established in update-cycle.yml.
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      # Workaround for actions/checkout#2351 (sporadic includeIf credential
      # race on v6 → "could not read Username, terminal prompts disabled").
      # Two attempts; remove once v6.0.3+ is pinned.
      - name: Check out repository (attempt 1/2)
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
        continue-on-error: true

      - name: Check out repository (attempt 2/2 — runs only if attempt 1 hit checkout#2351)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # Hugging Face Hub cache. The translation model
      # ``Helsinki-NLP/opus-mt-de-en`` (~300 MB) is fetched on the first
      # EN-feed run; subsequent runs hit the on-disk cache. The cache key
      # rotates monthly (YYYY-MM) so an auto-updated model still has a
      # chance to land within ~30 days while keeping daily-bandwidth
      # usage flat. ``restore-keys`` falls back to the previous-month
      # cache so the rotation does not force a fresh download.
      - name: Resolve Hugging Face cache key
        id: hf-cache-key
        shell: bash
        run: |
          echo "month=$(date -u +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Cache Hugging Face hub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ steps.hf-cache-key.outputs.month }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      # PyTorch CPU-only wheel (saves >1 GiB versus the default CUDA
      # build) — keep this step BEFORE the project requirements install
      # so the transformers pipeline finds an already-resolved torch.
      - name: Install PyTorch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # Compose the RSS feed from on-disk artefacts only. ``feed build``
      # reads the provider caches plus the Stammstrecke CSV ledger via
      # :mod:`src.feed.stammstrecke` (1-hour window, 9-min threshold)
      # and writes ``docs/feed.xml`` + ``data/first_seen.json``. No
      # network I/O.
      - name: Build feed
        run: python -m src.cli feed build
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder
          # geschrieben. Aus dem aktuellen Repo abgeleitet, damit Forks
          # korrekte atom:link-URLs schreiben statt auf das Original-Repo
          # zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      # Patch the README ``<!-- STATS:* -->`` markers with the 30-day
      # rolling snapshot. Reads only ``data/stats/*.csv`` (no network),
      # idempotent at the byte level, atomic write.
      #
      # ``--skip-dashboard`` pins this workflow to README-only output:
      # ``docs/statistik.md`` is the *yearly* dashboard and is owned by
      # the once-daily 00:00 Europe/Vienna tick of ``update-cycle.yml``.
      # Code-push triggers fire at unpredictable times of day and used
      # to silently move the dashboard's ``_Automatisch erzeugt am ..._``
      # timestamp every time someone pushed to ``src/**``, breaking the
      # "exactly one dashboard refresh per Vienna day" contract. Operators
      # who explicitly want a dashboard regen out-of-band run
      # ``manual-full-refresh.yml`` (the ``alles neu`` button that
      # also rebuilds caches, station directory and feed).
      - name: Refresh README snapshot (dashboard handled by update-cycle.yml)
        run: python scripts/generate_markdown_stats.py --skip-dashboard

      - name: Pull concurrent remote changes
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          # ``git pull --rebase --autostash`` does NOT fail when the
          # autostash RE-APPLY conflicts: the rebase (fast-forward onto a
          # concurrent push) succeeds, the failed ``git stash apply`` is
          # only a warning, and the step still exits 0 — leaving an UNMERGED
          # index. The next step (git-auto-commit-action) then dies with the
          # opaque "error: you need to resolve your current index first"
          # (observed 2026-05-25 on update-cycle.yml, the mirror of this
          # commit pattern). The shared ``external-api-fetch`` concurrency
          # lane now serialises the feed-writing workflows so this collision
          # should not recur; the block below is the defense-in-depth
          # backstop that keeps ANY residual concurrent push (a manual push,
          # a future workflow) from re-introducing the silent-unmerged-index
          # failure.
          git pull --rebase --autostash

          # Append-only ledgers (``data/stats/*.csv``) auto-resolve via the
          # ``merge=union`` driver in ``.gitattributes`` — both sides' rows
          # are kept, so they never surface as unmerged here. Everything
          # else this build writes (feed XMLs, README, the ``first_seen``
          # state) is a full regeneration from the on-disk caches, so on the
          # rare residual conflict the locally built copy is authoritative.
          mapfile -t -d '' conflicts < <(git diff --name-only --diff-filter=U -z)
          if [ "${#conflicts[@]}" -gt 0 ]; then
            echo "::warning title=reconcile::autostash re-apply conflicted on a concurrent push; keeping locally-built copies for: ${conflicts[*]}"
            # In a stash-apply conflict, stage 3 ("--theirs") is the stashed
            # locally-built version; stage 2 is the just-pulled upstream.
            git checkout --theirs -- "${conflicts[@]}"
            git add -- "${conflicts[@]}"
            # A conflicted ``git stash apply`` leaves the autostash entry on
            # the stash stack; drop it so it cannot leak into a later run.
            git stash drop || true
          fi

          # Never hand an unmerged index to the auto-commit step.
          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "::error title=reconcile::unresolved merge conflicts remain after reconcile" >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: 'chore: rebuild feed'
          # ``docs/feed.xml`` is the public output; ``data/first_seen.json``
          # is the build-feed state file tracking item ages and must
          # commit alongside the feed to keep the merge stable.
          # ``data/stats/stoerungen_<YYYY>.csv`` is appended by
          # ``build_feed.py:append_disruption_row`` whenever a strictly-
          # new disruption identity arrives; without committing it
          # here every Build-feed run silently drops those rows on the
          # ephemeral runner and the dashboard never grows past what
          # ``manual-full-refresh.yml`` happens to commit (audit
          # finding 2026-05-09 — this was the reason ``Häufigste
          # Störungsorte`` was sparse in the README until the manual
          # refresh ran). ``README.md`` carries the regenerated 30-day
          # snapshot from the same CSV ledger.
          # ``docs/statistik.md`` is intentionally *not* in this
          # allowlist — see the ``--skip-dashboard`` rationale above.
          file_pattern: |
            data/first_seen.json
            data/stats/stoerungen_*.csv
            docs/feed.xml
            docs/feed.en.xml
            README.md
