name: Build Feed

on:
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-feed.yml'

permissions:
  contents: read

# Verhindert, dass sich Cron-, Push- und manuell ausgelöste Läufe gegenseitig
# beim `git push` blockieren oder fehlschlagen lassen.
concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Pin pip<26 vorsorglich gegen unerwartete Breaking Changes in pip 26.x.
          # pip 26.0 ist seit 2026-01 released, 26.1 seit 2026-04 — Kompatibilität
          # mit unseren Deps (defusedxml, openpyxl, dnspython) noch nicht durchgetestet.
          # Re-evaluate als eigener Followup-PR. Letzte Prüfung: 2026-05-01.
          python -m pip install "pip<26"
          pip install -r requirements.txt

      - name: Build feed
        run: python src/build_feed.py
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder geschrieben.
          # Aus dem aktuellen Repo abgeleitet, damit Forks korrekte atom:link-URLs
          # schreiben statt auf das Original-Repo zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Configure Git
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          # Änderungen stagen
          git add -f docs/feed.xml || true
          git add data/first_seen.json || true

          # Prüfen, ob es gestagte Änderungen gibt
          if ! git diff --staged --quiet; then
            # Commit erstellen
            git commit -m "Update feed"

            # Neueste Änderungen vom Server holen (ohne Merge-Commits)
            git pull --rebase --autostash origin main

            # Änderungen pushen
            git push origin main
          fi
