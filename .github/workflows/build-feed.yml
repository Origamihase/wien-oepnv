name: Build feed

# DISABLED CRON (2026-05-09): the regular ``15,45`` schedule was
# replaced by the ``update-cycle.yml`` DAG workflow whose
# ``build_feed`` job depends on every cache fetcher via ``needs:``
# — the dependency graph (not a staggered cron) drives the timing.
#
# This workflow remains as the code-change verification path: a push
# to ``src/**`` etc. rebuilds the feed from whatever caches are
# currently on main, without firing any upstream API. The
# ``workflow_dispatch`` trigger lets operators force a rebuild after
# a manual cache refresh.
#
# Both retained triggers go through the same single job below, which
# reads only on-disk artefacts (caches + Stammstrecke CSV ledger)
# and never calls any upstream API or provider itself.
on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-feed.yml'

permissions:
  contents: read

# Independent concurrency lane — this workflow does no API I/O so
# it does not need to share the ``external-api-fetch`` lock with the
# data-fetcher workflows.
concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # Compose the RSS feed from on-disk artefacts only. ``feed build``
      # reads the provider caches plus the Stammstrecke CSV ledger via
      # :mod:`src.feed.stammstrecke` (1-hour window, 9-min threshold)
      # and writes ``docs/feed.xml`` + ``data/first_seen.json``. No
      # network I/O.
      - name: Build feed
        run: python -m src.cli feed build
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder
          # geschrieben. Aus dem aktuellen Repo abgeleitet, damit Forks
          # korrekte atom:link-URLs schreiben statt auf das Original-Repo
          # zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      # Patch the README ``<!-- STATS:* -->`` markers with the 30-day
      # rolling snapshot. Reads only ``data/stats/*.csv`` (no network),
      # idempotent at the byte level, atomic write.
      #
      # ``--skip-dashboard`` pins this workflow to README-only output:
      # ``docs/statistik.md`` is the *yearly* dashboard and is owned by
      # the once-daily 00:00 Europe/Vienna tick of ``update-cycle.yml``.
      # Code-push triggers fire at unpredictable times of day and used
      # to silently move the dashboard's ``_Automatisch erzeugt am ..._``
      # timestamp every time someone pushed to ``src/**``, breaking the
      # "exactly one dashboard refresh per Vienna day" contract. Operators
      # who explicitly want a dashboard regen out-of-band run
      # ``generate-stats.yml`` (the dedicated ``workflow_dispatch``
      # escape hatch).
      - name: Refresh README snapshot (dashboard handled by update-cycle.yml)
        run: python scripts/generate_markdown_stats.py --skip-dashboard

      - name: Pull concurrent remote changes
        if: github.ref == 'refs/heads/main'
        run: git pull --rebase --autostash

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: rebuild feed'
          # ``docs/feed.xml`` is the public output; ``data/first_seen.json``
          # is the build-feed state file tracking item ages and must
          # commit alongside the feed to keep the merge stable.
          # ``data/stats/stoerungen_<YYYY>.csv`` is appended by
          # ``build_feed.py:append_disruption_row`` whenever a strictly-
          # new disruption identity arrives; without committing it
          # here every Build-feed run silently drops those rows on the
          # ephemeral runner and the dashboard never grows past what
          # ``manual-full-refresh.yml`` happens to commit (audit
          # finding 2026-05-09 — this was the reason ``Häufigste
          # Störungsorte`` was sparse in the README until the manual
          # refresh ran). ``README.md`` carries the regenerated 30-day
          # snapshot from the same CSV ledger.
          # ``docs/statistik.md`` is intentionally *not* in this
          # allowlist — see the ``--skip-dashboard`` rationale above.
          file_pattern: |
            data/first_seen.json
            data/stats/stoerungen_*.csv
            docs/feed.xml
            README.md
