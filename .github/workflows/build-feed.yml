name: Build Feed

on:
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-feed.yml'

permissions:
  contents: read

# Verhindert, dass sich Cron-, Push- und manuell ausgelöste Läufe gegenseitig
# beim `git push` blockieren oder fehlschlagen lassen.
concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install "pip<26"
          pip install -r requirements.txt

      - name: Build feed
        run: python src/build_feed.py
        env:
          VOR_ACCESS_ID: ${{ secrets.VOR_API_KEY }}
          # Atom self/alternate-Links werden direkt im Python-Builder geschrieben.
          # Aus dem aktuellen Repo abgeleitet, damit Forks korrekte atom:link-URLs
          # schreiben statt auf das Original-Repo zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Configure Git
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          # Änderungen stagen
          git add -f docs/feed.xml || true
          git add data/first_seen.json || true

          # Prüfen, ob es gestagte Änderungen gibt
          if ! git diff --staged --quiet; then
            # Commit erstellen
            git commit -m "Update feed"

            # Neueste Änderungen vom Server holen (ohne Merge-Commits)
            git pull --rebase --autostash origin main

            # Änderungen pushen
            git push origin main
          fi
