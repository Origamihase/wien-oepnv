name: Build feed

# Pure consumer workflow. Reads existing on-disk artefacts, composes
# the public RSS feed (``docs/feed.xml``), and patches the README
# stats markers — never calls any upstream API or provider itself.
# Inputs:
#   * ``cache/wl_*/events.json``         — owned by ``update-wl-cache.yml``
#   * ``cache/oebb_*/events.json``       — owned by ``update-oebb-cache.yml``
#   * ``cache/baustellen_*/events.json`` — owned by ``update-baustellen-cache.yml``
#   * ``cache/vor_*/events.json``        — owned by ``update-vor-cache.yml``
#                                          (manual-only since the
#                                          2026-05-09 quota-conservation pass)
#   * ``data/stats/stammstrecke_<YYYY>.csv`` — owned by
#                                          ``update-stammstrecke-status.yml``
#
# Outputs:
#   * ``docs/feed.xml``       — the public RSS feed
#   * ``data/first_seen.json`` — feed-state for stable item ages
#   * ``docs/statistik.md``   — the operator-facing dashboard
#   * ``README.md``           — patched ``<!-- STATS:* -->`` blocks
#
# Cron schedule: ``15,45 * * * *`` — 15 minutes after the upstream
# ``update-stammstrecke-status.yml`` cron at ``0,30`` so the CSV
# ledger has settled before this workflow reads it. Push trigger
# rebuilds the feed whenever feed-relevant code changes (no API
# call, no quota consumption).
on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-feed.yml'

permissions:
  contents: read

# Independent concurrency lane — this workflow does no API I/O so
# it does not need to share the ``external-api-fetch`` lock with the
# data-fetcher workflows.
concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # Compose the RSS feed from on-disk artefacts only. ``feed build``
      # reads the provider caches plus the Stammstrecke CSV ledger via
      # :mod:`src.feed.stammstrecke` (1-hour window, 9-min threshold)
      # and writes ``docs/feed.xml`` + ``data/first_seen.json``. No
      # network I/O.
      - name: Build feed
        run: python -m src.cli feed build
        env:
          # Atom self/alternate-Links werden direkt im Python-Builder
          # geschrieben. Aus dem aktuellen Repo abgeleitet, damit Forks
          # korrekte atom:link-URLs schreiben statt auf das Original-Repo
          # zu zeigen.
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      # Regenerate the statistics dashboard (``docs/statistik.md``) AND
      # patch the README ``<!-- STATS:* -->`` markers with the 30-day
      # rolling snapshot. Reads only ``data/stats/*.csv`` (no network),
      # idempotent at the byte level, atomic write — so a kill-signal
      # mid-run cannot corrupt either output.
      - name: Refresh statistics dashboard and README snapshot
        run: python scripts/generate_markdown_stats.py

      - name: Pull concurrent remote changes
        if: github.ref == 'refs/heads/main'
        run: git pull --rebase --autostash

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: rebuild feed'
          # ``docs/feed.xml`` is the public output; ``data/first_seen.json``
          # is the build-feed state file tracking item ages and must
          # commit alongside the feed to keep the merge stable.
          # ``data/stats/stoerungen_<YYYY>.csv`` is appended by
          # ``build_feed.py:append_disruption_row`` whenever a strictly-
          # new disruption identity arrives; without committing it
          # here every Build-feed run silently drops those rows on the
          # ephemeral runner and the dashboard never grows past what
          # ``manual-full-refresh.yml`` happens to commit (audit
          # finding 2026-05-09 — this was the reason ``Häufigste
          # Störungsorte`` was sparse in the README until the manual
          # refresh ran). ``docs/statistik.md`` and ``README.md`` carry
          # the regenerated human-readable dashboard / snapshot from
          # the same CSV ledger.
          file_pattern: |
            data/first_seen.json
            data/stats/stoerungen_*.csv
            docs/feed.xml
            docs/statistik.md
            README.md
