name: Update station directory

# Refresh the canonical ``data/stations.json`` directory once per week
# (Sundays 01:00 UTC = 02:00/03:00 Vienna). The script merges four
# upstream sources:
#
# * ÖBB ``Verzeichnis der Verkehrsstationen`` Excel — ``update_station_
#   directory.py`` downloads the workbook from data.oebb.at on every
#   run; free open data, no auth.
# * Wien OGD ``wienerlinien-ogd-haltestellen``/``-haltepunkte`` CSVs —
#   ``update_wl_stations.py`` downloads the latest snapshot from
#   the canonical Wiener Linien OGD host
#   (``www.wienerlinien.at/ogd_realtime/doku/ogd/``) on every run
#   (``--download`` default-on) with graceful fallback to the pinned
#   local CSV on upstream outage; free open data, no auth.
# * OSM Overpass — ``_enrich_with_osm`` queries Overpass via the
#   ``WIEN_OEPNV_OSM_ENRICH=1`` env (toggled below by the Overpass
#   smoke check); free open data, retried.
# * Google Places — ``_enrich_with_google_places`` runs ONLY for the
#   subset of stations still missing coordinates after OSM
#   (``_stations_missing_coordinates`` strict subset). Persistent
#   monthly quota in ``data/places_quota.json`` enforces the contract
#   limit.
#
# VOR is intentionally not invoked from this workflow (the project
# reserves the VAO 100/day budget for the Stammstrecke monitor — see
# ``build-feed.yml``). VOR station IDs come from the
# pinned ``data/vor-haltestellen.csv`` snapshot.
on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: read

# Verhindert, dass sich Cron- und manuell ausgelöste Läufe gegenseitig
# beim `git push` blockieren oder fehlschlagen lassen.
concurrency:
  group: update-stations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # VOR stop-list refresh removed 2026-05-09 to keep the project under
      # the VAO Start tier's 100/day quota — the Stammstrecke monitor
      # (``build-feed.yml``) is the project's only
      # auto-running VOR API consumer and already owns 96 reqs/day. The
      # station directory update now relies on the pinned
      # ``data/vor-haltestellen.csv`` snapshot. To refresh the snapshot,
      # run ``python scripts/fetch_vor_haltestellen.py`` manually — the
      # operator then explicitly accepts the quota cost (a few extra
      # requests; VOR station IDs change rarely so a many-month-old
      # snapshot is operationally equivalent to a fresh fetch).

      - name: Overpass smoke check (fail-fast / skip-OSM gate)
        id: overpass-smoke
        # ``--allow-skip`` downgrades network-failure exits to success so the
        # job can keep running with the Google Places fallback when the public
        # Overpass mirror is degraded. The step's outcome is wired into the
        # next step's ``WIEN_OEPNV_OSM_ENRICH`` env so we don't waste the
        # urllib3 retry budget on a known-down upstream.
        run: python scripts/check_overpass_status.py --allow-skip --verbose
        continue-on-error: true

      - name: Refresh station directory
        env:
          WIEN_OEPNV_OSM_ENRICH: ${{ steps.overpass-smoke.outcome == 'success' && '1' || '0' }}
        run: python scripts/update_all_stations.py --verbose

      - name: Regenerate validation report
        run: python -m src.cli stations validate --output docs/stations_validation_report.md

      - name: Prepare repository (rebase main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore(data): refresh station directory [skip ci]"
          add_options: "-A"
          push_options: "--force-with-lease"
