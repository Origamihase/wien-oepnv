name: Update station directory

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # pip cap raised to <27 (was <26). Background:
          #   - pip 26.0 released 2026-01-30, pip 26.1 released 2026-04-26.
          #   - Both versions stable in production for our dependency stack.
          # Re-evaluate at pip 27 announcement; consider removing the cap
          # entirely once 27.x is also confirmed stable.
          python -m pip install "pip<27"
          pip install -r requirements.txt

      - name: Refresh station directory
        run: python scripts/update_all_stations.py --verbose

      - name: Prepare repository (rebase main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main

      - name: Validate stations
        run: python scripts/validate_stations.py

      - name: Pull concurrent remote changes
        run: git pull --rebase --autostash

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore(data): add VOR stations (900100, 900300) + CI harden"
          add_options: "-A"
          push_options: "--force-with-lease"
