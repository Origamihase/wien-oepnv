# Run `pre-commit install` once after cloning to enable these hooks.
# Run `pre-commit run --all-files` to check the whole repo manually.
#
# Mypy and the local secret scanner use language: system so they pick
# up the exact versions installed in the contributor's venv (matching
# what runs on CI). All other hooks pin upstream tool revisions to
# reproducible SHAs.
default_language_version:
  python: python3.11

repos:
  # ── basic hygiene ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # docs/feed.xml is regenerated programmatically; let the
        # builder own its own whitespace.
        exclude: ^(docs/feed\.xml|docs/sitemap\.xml|cache/.*\.json|data/.*\.json|tests/fixtures/.*)$
      - id: end-of-file-fixer
        exclude: ^(docs/feed\.xml|docs/sitemap\.xml|cache/.*\.json|data/.*\.json|tests/fixtures/.*)$
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^(cache/.*|data/.*\.json)$
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # ── ruff (linter, includes the bugbear / security rules already
  #    selected via pyproject.toml: E, F, S, B) ─────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]

  # ── mypy --strict (uses the venv installation so the version and
  #    plugins match exactly what CI runs) ──────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict
        entry: python -m mypy
        language: system
        types: [python]
        # mypy's pyproject.toml config drives file selection; we let
        # mypy itself walk src/ rather than pass each staged file
        # individually (which would miss cross-module type errors).
        pass_filenames: false
        require_serial: true

  # ── scan for accidentally committed secrets ──────────────────────
  - repo: local
    hooks:
      - id: scan-secrets
        name: scan for accidentally committed secrets
        entry: python scripts/scan_secrets.py
        language: system
        pass_filenames: false
        require_serial: true

  # ── bandit security SAST (matches CI's bandit job) ──────────────
  # Shift-left for the bandit gate so contributors catch B-class
  # issues before pushing instead of discovering them in CI.
  # ``-q`` suppresses non-error output; ``-r src scripts`` matches
  # ``run_static_checks.py``'s invocation exactly.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "src", "scripts", "-q"]
        pass_filenames: false

  # ── C901 complexity gate (matches CI's complexity-gate workflow) ─
  # Allowlist-style baseline check: rejects NEW functions whose
  # McCabe complexity exceeds 15, or existing functions whose
  # complexity has risen above what's recorded in
  # ``.c901-baseline.txt``. Reducing complexity below baseline is
  # always allowed; the baseline ratchets via
  # ``bash scripts/regen_c901_baseline.sh``.
  - repo: local
    hooks:
      - id: c901-baseline
        name: C901 complexity gate (max 15 for new code)
        entry: python scripts/check_complexity.py
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

  # ── Static-site asset drift check ────────────────────────────────
  # docs/assets/site.min.css and docs/assets/site.min.js are derived
  # from their readable sources (site.css / site.js); the dashboard's
  # docs/site.html references the minified copies. This hook fails if
  # the committed bundles fall out of sync with the source — the fix
  # is to re-run ``python scripts/optimize_site_assets.py --skip-images``
  # and stage the regenerated bundles.
  - repo: local
    hooks:
      - id: site-assets-minified
        name: docs/assets/site.min.* matches source
        entry: python scripts/optimize_site_assets.py --check
        language: system
        files: ^docs/assets/site\.(css|js|min\.css|min\.js)$
        pass_filenames: false
        require_serial: true
