[tool.ruff]
line-length = 140
target-version = "py311"
src = ["src"]
exclude = [
  ".git",
  "cache",
  "data",
  "docs",
  "log",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "S",
  "B",
  "UP",
]
ignore = [
  # PEP 604 union types (X | Y) can change runtime behaviour for code
  # that introspects annotations (e.g. NamedTuple, TypedDict, custom
  # validators). We modernise the generic containers via UP006 but keep
  # the typing.Union form, the typing.Optional form, and tuple-style
  # isinstance checks as-is for safety.
  "UP007",
  "UP038",
]

[tool.ruff.lint.per-file-ignores]





"src/utils/secret_scanner.py" = ["S603", "S607"]

"scripts/generate_sitemap.py" = ["S603", "S607"]
"scripts/run_static_checks.py" = ["S603"]
"scripts/update_all_stations.py" = ["S603"]
"scripts/update_station_directory.py" = ["S603"]
"tests/**/*.py" = [
  "S101", "S113", "S314", "S105", "S108", "S110", "S310", "F841",
  # bugbear rules deliberately allowed in tests:
  "B007",  # parametrize-style loops where one variable is intentionally unused
  "B010",  # Module mocks: setattr(mock_module, "fetch_events", ...) is the natural form
  "B011",  # `assert False` is fine in tests; it never runs under `python -O`
  "B018",  # bare-expression style is sometimes used to assert no exception
]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
show_error_codes = true
pretty = true
ignore_missing_imports = true
explicit_package_bases = false
files = ["src"]
disable_error_code = ["import-untyped"]
enable_error_code = [
    "possibly-undefined",
    "ignore-without-code",
    "truthy-bool",
    "redundant-self",
]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = false

[tool.pytest.ini_options]
addopts = "--timeout=60"
pythonpath = ["."]

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
  "src/__init__.py",
  "src/*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
exclude_also = [
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
  "\\.\\.\\.",
]
