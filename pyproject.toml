[tool.ruff]
line-length = 140
target-version = "py311"
src = ["src"]
exclude = [
  ".git",
  "cache",
  "data",
  "docs",
  "log",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "S",
]

[tool.ruff.lint.per-file-ignores]





"src/utils/secret_scanner.py" = ["S603", "S607"]

"scripts/generate_sitemap.py" = ["S603", "S607"]
"scripts/run_static_checks.py" = ["S603"]
"scripts/update_all_stations.py" = ["S603"]
"scripts/update_station_directory.py" = ["S603"]
"tests/**/*.py" = ["S101", "S113", "S314", "S105", "S108", "S110", "S310", "F841"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
show_error_codes = true
pretty = true
ignore_missing_imports = true
explicit_package_bases = false
files = ["src"]
disable_error_code = ["import-untyped"]
enable_error_code = [
    "possibly-undefined",
    "ignore-without-code",
    "truthy-bool",
    "redundant-self",
]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = false

[tool.pytest.ini_options]
addopts = "--timeout=60"
pythonpath = ["src"]
